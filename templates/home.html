<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JafaStageCenter</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(ellipse at 30% 20%, #0d0d1a 0%, #06060a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Sen', sans-serif;
            color: #e0e0e0;
            overflow: hidden;
        }

        canvas#bg-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
            opacity: 0.4;
        }

        .content {
            position: relative; z-index: 10;
            display: flex; flex-direction: column; align-items: center;
            gap: 40px;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes titleGlow {
            0%, 100% { text-shadow: 0 0 30px rgba(108,92,231,0.3); }
            50% { text-shadow: 0 0 50px rgba(108,92,231,0.5), 0 0 80px rgba(108,92,231,0.2); }
        }

        .app-title {
            font-size: 2.2rem;
            font-weight: 200;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: #6c5ce7;
            text-shadow: 0 0 30px rgba(108,92,231,0.3);
            animation: titleGlow 4s ease-in-out infinite;
        }

        .subtitle {
            font-size: 0.95rem;
            color: rgba(255,255,255,0.3);
            margin-top: -20px;
            letter-spacing: 2px;
        }

        .cards {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 900px;
        }

        .card {
            background: rgba(108,92,231,0.03);
            border: 1px solid rgba(108,92,231,0.08);
            border-radius: 20px;
            padding: 40px 36px 32px;
            width: 210px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }

        .card:hover {
            background: rgba(108,92,231,0.08);
            border-color: rgba(108,92,231,0.3);
            transform: translateY(-8px);
            box-shadow: 0 20px 60px rgba(108,92,231,0.15);
        }

        .card-icon {
            font-size: 2.8rem;
            line-height: 1;
            color: rgba(255,255,255,0.7);
        }

        .card-icon svg {
            stroke: rgba(255,255,255,0.7);
            transition: stroke 0.4s cubic-bezier(0.4,0,0.2,1);
        }

        .card:hover .card-icon svg {
            stroke: #6c5ce7;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
        }

        .card-desc {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.35);
            line-height: 1.5;
        }

        .card.primary {
            border-color: rgba(108,92,231,0.2);
            background: rgba(108,92,231,0.06);
        }

        .footer-hint {
            position: fixed;
            bottom: 20px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.2);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <div class="content">
        <div class="app-title">JafaStageCenter</div>
        <div class="subtitle">Wybierz widok</div>

        <div class="cards">
            <a href="/control" class="card primary">
                <div class="card-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div>
                <div class="card-title">Panel Sterowania</div>
                <div class="card-desc">Zarządzaj setlistą, piosenkami i prezentacją</div>
            </a>

            <a href="/band_member" class="card">
                <div class="card-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div>
                <div class="card-title">Członek Zespołu</div>
                <div class="card-desc">Akordy, capo, Nashville, diagramy chwytów</div>
            </a>

            <a href="/stage" class="card">
                <div class="card-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></div>
                <div class="card-title">Widok Zespołu</div>
                <div class="card-desc">Tekst i akordy na scenie</div>
            </a>

            <a href="/projector" class="card">
                <div class="card-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"/><polyline points="17 2 12 7 7 2"/></svg></div>
                <div class="card-title">Projektor</div>
                <div class="card-desc">Czysty tekst dla widowni</div>
            </a>
        </div>
    </div>

    <div class="footer-hint">
        <span id="countdown-text">Automatyczne przejście do widoku zespołu za <span id="countdown">20</span>s</span>
        &bull; JafaStageCenter
    </div>

    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class P {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.s = Math.random() * 1.5 + 0.3;
                this.vx = (Math.random() - 0.5) * 0.4;
                this.vy = (Math.random() - 0.5) * 0.4;
                this.o = Math.random() * 0.4 + 0.1;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;
            }
            draw() {
                ctx.fillStyle = `rgba(108,92,231,${this.o})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.s, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 80; i++) particles.push(new P());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        let secondsLeft = 20;
        const countdownEl = document.getElementById('countdown');
        const autoTimer = setInterval(() => {
            secondsLeft--;
            countdownEl.textContent = secondsLeft;
            if (secondsLeft <= 0) {
                clearInterval(autoTimer);
                document.body.style.transition = 'opacity 0.5s';
                document.body.style.opacity = '0';
                setTimeout(() => {
                    window.location.href = '/stage';
                    try { document.documentElement.requestFullscreen(); } catch(e) {}
                }, 500);
            }
        }, 1000);

        document.addEventListener('click', () => clearInterval(autoTimer));
        document.addEventListener('mousemove', () => {
            clearInterval(autoTimer);
            document.getElementById('countdown-text').textContent = '';
        }, { once: true });
    </script>
</body>
</html>
