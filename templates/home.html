<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JafaStageCenter</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/design-system.css') }}">
    <script src="{{ url_for('static', filename='js/i18n.js') }}"></script>
    <style>
        body {
            background: radial-gradient(ellipse at 30% 20%, #0d0d1a 0%, var(--bg-app) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        [data-theme="light"] body {
            background: radial-gradient(ellipse at 30% 20%, #e8e8f2 0%, var(--bg-app) 100%);
        }

        canvas#bg-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
            opacity: 0.4;
        }

        .content {
            position: relative; z-index: 10;
            display: flex; flex-direction: column; align-items: center;
            gap: 40px;
            animation: fadeInUp 0.8s ease;
        }

        @keyframes titleGlow {
            0%, 100% { text-shadow: 0 0 30px var(--glow-primary); }
            50% { text-shadow: 0 0 50px var(--glow-primary), 0 0 80px rgba(59,130,246,0.2); }
        }

        .app-title {
            font-size: var(--text-3xl);
            font-weight: 200;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: var(--accent-primary);
            text-shadow: 0 0 30px var(--glow-primary);
            animation: titleGlow 4s ease-in-out infinite;
        }

        .subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-top: -20px;
            letter-spacing: 2px;
        }

        .cards {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 900px;
        }

        .home-card {
            background: rgba(59,130,246,0.03);
            border: 1px solid rgba(59,130,246,0.08);
            border-radius: var(--radius-xl);
            padding: 40px 36px 32px;
            width: 210px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }

        .home-card:hover {
            background: rgba(59,130,246,0.08);
            border-color: var(--accent-primary);
            transform: translateY(-8px);
            box-shadow: 0 20px 60px var(--glow-primary);
        }

        .home-card-icon {
            font-size: 2.8rem;
            line-height: 1;
            color: var(--text-muted);
        }

        .home-card-icon svg {
            stroke: var(--text-muted);
            transition: stroke 0.4s cubic-bezier(0.4,0,0.2,1);
        }

        .home-card:hover .home-card-icon svg {
            stroke: var(--accent-primary);
        }

        .home-card-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .home-card-desc {
            font-size: var(--text-xs);
            color: var(--text-muted);
            line-height: 1.5;
        }

        .home-card.primary {
            border-color: rgba(59,130,246,0.2);
            background: rgba(59,130,246,0.06);
        }

        [data-theme="light"] .home-card {
            background: var(--bg-panel);
            border-color: var(--border-color);
        }

        [data-theme="light"] .home-card:hover {
            background: var(--bg-element-hover);
            border-color: var(--accent-primary);
            box-shadow: 0 20px 60px var(--glow-primary);
        }

        [data-theme="light"] .home-card.primary {
            border-color: var(--accent-primary);
            background: var(--accent-active-bg);
        }

        .footer-hint {
            position: fixed;
            bottom: 20px;
            font-size: var(--text-sm);
            color: var(--text-muted);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <div class="content">
        <div class="app-title">JafaStageCenter</div>
        <div class="subtitle" data-t="choose_view">Wybierz widok</div>

        <div class="cards">
            <a href="/control" class="home-card primary">
                <div class="home-card-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div>
                <div class="home-card-title" data-t="control_panel">Panel Sterowania</div>
                <div class="home-card-desc" data-t="control_desc">Zarządzaj setlistą, piosenkami i prezentacją</div>
            </a>

            <a href="/band_member" class="home-card">
                <div class="home-card-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div>
                <div class="home-card-title" data-t="band_member_title">Członek Zespołu</div>
                <div class="home-card-desc" data-t="band_desc">Akordy, capo, Nashville, diagramy chwytów</div>
            </a>

            <a href="/stage" class="home-card">
                <div class="home-card-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></div>
                <div class="home-card-title" data-t="stage_view">Widok Zespołu</div>
                <div class="home-card-desc" data-t="stage_desc">Tekst i akordy na scenie</div>
            </a>

            <a href="/projector" class="home-card">
                <div class="home-card-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"/><polyline points="17 2 12 7 7 2"/></svg></div>
                <div class="home-card-title" data-t="projector_title">Projektor</div>
                <div class="home-card-desc" data-t="projector_desc">Czysty tekst dla widowni</div>
            </a>
        </div>
    </div>

    <div class="footer-hint">
        <span id="countdown-text"><span data-t="auto_redirect">Automatyczne przejście do widoku zespołu za</span> <span id="countdown">20</span><span data-t="seconds_abbr">s</span></span>
        &bull; JafaStageCenter
    </div>

    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Read accent color from CSS variable for particle rendering
        function getAccentRGB() {
            var style = getComputedStyle(document.documentElement);
            var hex = style.getPropertyValue('--accent-primary').trim();
            if (hex.charAt(0) === '#') {
                var r = parseInt(hex.substring(1,3), 16);
                var g = parseInt(hex.substring(3,5), 16);
                var b = parseInt(hex.substring(5,7), 16);
                return r + ',' + g + ',' + b;
            }
            return '59,130,246';
        }

        class P {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.s = Math.random() * 1.5 + 0.3;
                this.vx = (Math.random() - 0.5) * 0.4;
                this.vy = (Math.random() - 0.5) * 0.4;
                this.o = Math.random() * 0.4 + 0.1;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;
            }
            draw() {
                ctx.fillStyle = 'rgba(' + getAccentRGB() + ',' + this.o + ')';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.s, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 80; i++) particles.push(new P());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        let secondsLeft = 20;
        const countdownEl = document.getElementById('countdown');
        const autoTimer = setInterval(() => {
            secondsLeft--;
            countdownEl.textContent = secondsLeft;
            if (secondsLeft <= 0) {
                clearInterval(autoTimer);
                document.body.style.transition = 'opacity 0.5s';
                document.body.style.opacity = '0';
                setTimeout(() => {
                    window.location.href = '/stage';
                    try { document.documentElement.requestFullscreen(); } catch(e) {}
                }, 500);
            }
        }, 1000);

        document.addEventListener('click', () => clearInterval(autoTimer));
        document.addEventListener('mousemove', () => {
            clearInterval(autoTimer);
            document.getElementById('countdown-text').textContent = '';
        }, { once: true });
    </script>
    <script>initI18n();</script>
</body>
</html>
