<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JafaStageCenter</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/design-system.css') }}">
    <script src="{{ url_for('static', filename='js/i18n.js') }}"></script>
    <style>
        body {
            background: var(--bg-app);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        canvas#bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            opacity: 0.3;
        }

        /* Miękka poświata za brandem — głębia bez efekciarstwa */
        body::before {
            content: "";
            position: fixed;
            top: 20%; left: 50%;
            width: 720px; height: 480px;
            transform: translateX(-50%);
            background: radial-gradient(ellipse at center, var(--accent-glow) 0%, transparent 65%);
            opacity: 0.5;
            pointer-events: none;
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--s10);
            animation: fadeInUp 0.6s var(--ease-out);
        }

        .brand {
            text-align: center;
        }

        .app-title {
            font-size: var(--font-3xl);
            font-weight: 800;
            letter-spacing: -0.02em;
            color: var(--text-primary);
            margin: 0;
        }
        .app-title span {
            color: var(--accent);
        }

        .subtitle {
            font-size: var(--font-sm);
            color: var(--text-tertiary);
            margin-top: var(--s2);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-weight: 600;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(4, 180px);
            gap: var(--s5);
        }

        .home-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-default);
            border-radius: var(--r-xl);
            padding: var(--s8) var(--s6) var(--s6);
            text-align: center;
            cursor: pointer;
            transition: all var(--duration-normal) var(--ease-out);
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--s3);
        }

        .home-card:hover {
            background: var(--bg-surface-hover);
            border-color: var(--accent);
            transform: translateY(-6px);
            box-shadow: var(--shadow-lg), var(--shadow-glow);
        }

        .home-card-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--r-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: var(--s1);
            transition: all var(--duration-normal) var(--ease-out);
        }
        .home-card-icon svg {
            transition: stroke var(--duration-normal) var(--ease-out);
        }
        /* Każdy widok ma własny odcień — czytelna nawigacja bez czytania etykiet */
        .home-card[data-hue="blue"]  .home-card-icon { background: var(--accent-subtle); }
        .home-card[data-hue="blue"]  .home-card-icon svg { stroke: var(--accent); }
        .home-card[data-hue="teal"]  .home-card-icon { background: var(--teal-subtle); }
        .home-card[data-hue="teal"]  .home-card-icon svg { stroke: var(--teal); }
        .home-card[data-hue="amber"] .home-card-icon { background: var(--amber-subtle); }
        .home-card[data-hue="amber"] .home-card-icon svg { stroke: var(--amber); }
        .home-card[data-hue="green"] .home-card-icon { background: var(--green-subtle); }
        .home-card[data-hue="green"] .home-card-icon svg { stroke: var(--green); }
        .home-card:hover .home-card-icon {
            transform: scale(1.06);
        }
        .home-card[data-hue="blue"]:hover  { border-color: var(--accent); }
        .home-card[data-hue="teal"]:hover  { border-color: var(--teal); }
        .home-card[data-hue="amber"]:hover { border-color: var(--amber); }
        .home-card[data-hue="green"]:hover { border-color: var(--green); }

        .card-kbd {
            margin-top: var(--s2);
            font-size: var(--font-xs);
            color: var(--text-tertiary);
            border: 1px solid var(--border-default);
            border-radius: var(--r-sm);
            padding: 1px 7px;
            font-family: inherit;
            opacity: 0.7;
        }

        .home-card-title {
            font-size: var(--font-sm);
            font-weight: 700;
            color: var(--text-primary);
        }

        .home-card-desc {
            font-size: var(--font-xs);
            color: var(--text-tertiary);
            line-height: 1.5;
        }

        .home-card.primary {
            border-color: var(--border-strong);
            background: var(--bg-elevated);
        }

        .footer-hint {
            position: fixed;
            bottom: var(--s5);
            font-size: var(--font-xs);
            color: var(--text-tertiary);
            letter-spacing: 0.04em;
            z-index: 10;
        }

        @media (max-width: 800px) {
            .cards {
                grid-template-columns: repeat(2, 1fr);
                max-width: 400px;
                gap: var(--s4);
            }
            .app-title { font-size: var(--font-2xl); }
        }

        @media (max-width: 420px) {
            .cards {
                grid-template-columns: 1fr;
                max-width: 280px;
            }
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <div class="content">
        <div class="brand">
            <h1 class="app-title">Jafa<span>Stage</span>Center</h1>
            <div class="subtitle" data-t="choose_view">Wybierz widok</div>
        </div>

        <div class="cards">
            <a href="/control" class="home-card primary" data-hue="blue">
                <div class="home-card-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div>
                <div class="home-card-title" data-t="control_panel">Panel Sterowania</div>
                <div class="home-card-desc" data-t="control_desc">Zarządzaj setlistą, piosenkami i prezentacją</div>
                <kbd class="card-kbd">1</kbd>
            </a>

            <a href="/band_member" class="home-card" data-hue="teal">
                <div class="home-card-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div>
                <div class="home-card-title" data-t="band_member_title">Członek Zespołu</div>
                <div class="home-card-desc" data-t="band_desc">Akordy, capo, Nashville, diagramy chwytów</div>
                <kbd class="card-kbd">2</kbd>
            </a>

            <a href="/stage" class="home-card" data-hue="amber">
                <div class="home-card-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></div>
                <div class="home-card-title" data-t="stage_view">Widok Zespołu</div>
                <div class="home-card-desc" data-t="stage_desc">Tekst i akordy na scenie</div>
                <kbd class="card-kbd">3</kbd>
            </a>

            <a href="/projector" class="home-card" data-hue="green">
                <div class="home-card-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"/><polyline points="17 2 12 7 7 2"/></svg></div>
                <div class="home-card-title" data-t="projector_title">Projektor</div>
                <div class="home-card-desc" data-t="projector_desc">Czysty tekst dla widowni</div>
                <kbd class="card-kbd">4</kbd>
            </a>
        </div>
    </div>

    <div class="footer-hint">
        <span id="countdown-text"><span data-t="auto_redirect">Automatyczne przejście do widoku zespołu za</span> <span id="countdown">20</span><span data-t="seconds_abbr">s</span></span>
        &bull; JafaStageCenter
    </div>

    <script>
        var canvas = document.getElementById('bg-canvas');
        var ctx = canvas.getContext('2d');
        var particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function getAccentRGB() {
            var style = getComputedStyle(document.documentElement);
            var hex = style.getPropertyValue('--accent').trim();
            if (hex.charAt(0) === '#') {
                var r = parseInt(hex.substring(1,3), 16);
                var g = parseInt(hex.substring(3,5), 16);
                var b = parseInt(hex.substring(5,7), 16);
                return r + ',' + g + ',' + b;
            }
            return '79,127,255';
        }

        function P() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.s = Math.random() * 1.2 + 0.2;
            this.vx = (Math.random() - 0.5) * 0.3;
            this.vy = (Math.random() - 0.5) * 0.3;
            this.o = Math.random() * 0.3 + 0.05;
        }
        P.prototype.update = function() {
            this.x += this.vx;
            this.y += this.vy;
            if (this.x < 0) this.x = canvas.width;
            if (this.x > canvas.width) this.x = 0;
            if (this.y < 0) this.y = canvas.height;
            if (this.y > canvas.height) this.y = 0;
        };
        P.prototype.draw = function() {
            ctx.fillStyle = 'rgba(' + getAccentRGB() + ',' + this.o + ')';
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.s, 0, Math.PI * 2);
            ctx.fill();
        };

        for (var i = 0; i < 60; i++) particles.push(new P());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (var j = 0; j < particles.length; j++) {
                particles[j].update();
                particles[j].draw();
            }
            requestAnimationFrame(animate);
        }
        animate();

        var secondsLeft = 20;
        var countdownEl = document.getElementById('countdown');
        var autoTimer = setInterval(function() {
            secondsLeft--;
            countdownEl.textContent = secondsLeft;
            if (secondsLeft <= 0) {
                clearInterval(autoTimer);
                document.body.style.transition = 'opacity 0.5s';
                document.body.style.opacity = '0';
                setTimeout(function() {
                    window.location.href = '/stage';
                    try { document.documentElement.requestFullscreen(); } catch(e) {}
                }, 500);
            }
        }, 1000);

        document.addEventListener('click', function() { clearInterval(autoTimer); });
        document.addEventListener('mousemove', function() {
            clearInterval(autoTimer);
            document.getElementById('countdown-text').textContent = '';
        }, { once: true });

        document.addEventListener('keydown', function(e) {
            var routes = { '1': '/control', '2': '/band_member', '3': '/stage', '4': '/projector' };
            if (routes[e.key]) { clearInterval(autoTimer); window.location.href = routes[e.key]; }
        });
    </script>
    <script>initI18n();</script>
</body>
</html>
