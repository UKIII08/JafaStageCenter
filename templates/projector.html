<!DOCTYPE html>
<html>
<head>
    <title>Rzutnik</title>
    <link href="https://fonts.googleapis.com/css2?family=Sen:wght@700&family=Roboto:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        :root {
            --bg-color: {{ settings.bg_color }};
            --text-color: {{ settings.text_color }};
            --font-family: '{{ settings.font_family }}', sans-serif;
        }
        body { 
            background-color: var(--bg-color); 
            /* Tło graficzne jeśli jest wgrane */
            background-image: url("{{ url_for('static', filename='background.png') }}?v={{ range(1,1000)|random }}");
            background-size: cover; background-position: center; background-repeat: no-repeat;
            color: var(--text-color); font-family: var(--font-family);
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; overflow: hidden;
        }
        /* Jeśli pliku nie ma (404), przeglądarka po prostu użyje background-color */

        #slide-content { 
            font-size: 5vw; font-weight: 700; line-height: 1.3;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8); /* Mocny cień dla czytelności na zdjęciach */
            padding: 50px;
            z-index: 10;
        }
        #logo-image { display: none; max-width: 80vw; max-height: 80vh; object-fit: contain; z-index: 20; }
    </style>
</head>
<body>
    <div id="slide-content"></div>
    <img id="logo-image" src="{{ url_for('static', filename='logo.png') }}?v={{ range(1,1000)|random }}" alt="Logo">

    <script>
        var socket = io();
        const slide = document.getElementById('slide-content');
        const logo = document.getElementById('logo-image');
        const root = document.documentElement;

        socket.on('update_slide', function(data) {
            slide.style.display = 'none'; logo.style.display = 'none';
            if (data.mode === 'logo') logo.style.display = 'block';
            else if (data.mode === 'blackout') {}
            else if (data.mode === 'worship') { slide.style.display = 'block'; slide.innerHTML = data.people; }
        });

        socket.on('apply_settings', function(data) {
            root.style.setProperty('--bg-color', data.bg_color);
            root.style.setProperty('--text-color', data.text_color);
            root.style.setProperty('--font-family', data.font_family);
        });

        socket.on('refresh_logo', function() {
            logo.src = "{{ url_for('static', filename='logo.png') }}?v=" + new Date().getTime();
        });

        socket.on('refresh_background', function(data) {
            if(data.has_bg) document.body.style.backgroundImage = "url('/static/background.png?v=" + new Date().getTime() + "')";
            else document.body.style.backgroundImage = "none";
        });
    </script>
</body>
</html>
