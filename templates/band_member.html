<!DOCTYPE html>
<html>
<head>
    <title>Widok Członka Zespołu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/design-system.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="{{ url_for('static', filename='js/i18n.js') }}"></script>
    <script src="{{ url_for('static', filename='js/chord_diagrams.js') }}"></script>
    <style>
        @keyframes scaleIn {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        body {
            background-color: var(--bg-app);
            color: var(--text-primary);
            font-family: 'Sen', sans-serif;
            margin: 0; padding: 0;
            height: 100vh; width: 100vw;
            overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* PRZYCISKI GÓRNE */
        #fs-btn, #settings-btn {
            position: absolute;
            top: var(--s3);
            background: var(--glass-bg);
            border: 1px solid var(--border-default);
            color: var(--text-primary);
            font-size: 2vh;
            padding: var(--s2) var(--s3);
            cursor: pointer;
            z-index: 9999;
            border-radius: var(--r-md);
            opacity: 0.5;
            transition: all var(--duration-normal) var(--ease-out);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            backdrop-filter: blur(8px);
        }
        #fs-btn { right: var(--s3); }
        #settings-btn { right: 60px; }
        #fs-btn:hover, #settings-btn:hover { opacity: 1; filter: brightness(1.15); }
        #fs-btn:active, #settings-btn:active { transform: scale(0.97); }

        /* --- WIDOK UWIELBIENIA --- */
        #worship-view {
            display: flex;
            flex-direction: column;
            height: 100%; width: 100%;
        }

        /* GÓRA (70%) */
        #current-slide {
            height: 70vh;
            width: 100%;
            padding: 0 20px; box-sizing: border-box;
            border-bottom: 1px solid var(--border-default);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 8vh;
            line-height: 2.2;
            overflow: hidden;
            position: relative;
        }

        #stage-logo {
            max-width: 60%;
            max-height: 80%;
            object-fit: contain;
            display: block;
        }

        #current-content {
            display: none;
            width: 100%;
        }

        /* DÓŁ (30%) */
        #next-slide-container {
            height: 30vh;
            width: 100%;
            background-color: var(--bg-app);
            padding: 10px 40px; box-sizing: border-box;
            border-top: 1px solid var(--border-default);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .meta-info-container {
            position: absolute;
            top: 15px;
            right: 20px;
            text-align: right;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 5px;
        }

        #realtime-clock {
            font-size: 3.5vh;
            color: var(--text-tertiary);
            font-family: monospace;
            font-weight: bold;
        }

        #key-display {
            font-size: 3.5vh;
            color: var(--teal);
            font-weight: bold;
            display: none;
        }

        #capo-display {
            font-size: 2.5vh;
            color: var(--green);
            font-weight: bold;
            display: none;
        }

        #bpm-display {
            font-size: 2.5vh;
            color: var(--amber);
            font-weight: bold;
            font-family: monospace;
            letter-spacing: 1px;
            display: none;
        }

        #next-label {
            font-size: var(--font-xs);
            color: var(--red);
            font-weight: 700;
            margin-bottom: var(--s1);
            flex-shrink: 0;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        #next-content {
            flex-grow: 1;
            color: var(--text-secondary);
            font-size: 4vh;
            line-height: 2.0;
            text-align: left;
            overflow: hidden;
            display: flex;
            align-items: flex-start;
            padding-top: 15px;
            padding-right: 180px;
        }

        .text-wrapper { width: 100%; }

        /* AKORDY */
        .chord-wrapper { display: inline-block; position: relative; overflow: visible; vertical-align: baseline; }
        .bass-slash { color: var(--red); opacity: 0.8; }
        .bass-note { color: var(--teal); font-weight: 800; font-size: 0.95em; }

        #current-slide .chord {
            position: absolute; bottom: 0.7em; left: 0; transform: none;
            color: var(--accent); font-weight: 700; font-size: 0.65em;
            background: transparent; padding: 0; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        #current-slide .chord.nashville { color: var(--amber); }
        #current-slide .chord.capo { color: var(--green); }

        #next-slide-container .chord-wrapper {
            display: inline-block !important;
            position: relative;
            overflow: visible;
            vertical-align: baseline;
        }
        #next-slide-container .chord {
            position: absolute !important;
            bottom: 0.6em;
            left: 0;
            color: var(--green);
            font-size: 0.6em;
            font-weight: bold;
            white-space: nowrap;
        }
        #next-slide-container .chord.nashville { color: var(--amber); opacity: 0.6; }
        #next-slide-container .chord.capo { color: var(--green); opacity: 0.6; }

        #current-slide .chord.hard-chord {
            color: var(--amber);
            text-decoration: underline;
            text-decoration-style: dotted;
            text-underline-offset: 3px;
        }

        .chord-only-line .chord {
            position: static !important;
            font-size: 1em !important;
            display: inline-block;
            margin-right: 0.5em;
        }

        /* --- WIDOK KONFERENCJI --- */
        #conference-view {
            display: none; height: 100%; width: 100%;
            background: var(--bg-app);
            flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        #conf-timer { font-size: 25vh; font-weight: bold; font-family: monospace; color: white; margin-bottom: 5vh; }
        #conf-message { font-size: 8vh; color: yellow; padding: 20px; max-width: 90%; }

        /* --- PANEL USTAWIEŃ --- */
        #settings-overlay {
            display: none;
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 10000;
        }
        #settings-panel {
            position: fixed; top: 0; right: -360px;
            width: 340px; height: 100%;
            background: var(--bg-panel);
            backdrop-filter: blur(24px);
            border-left: 1px solid var(--border-default);
            border-radius: var(--r-xl) 0 0 var(--r-xl);
            z-index: 10001;
            transition: right var(--duration-normal) var(--ease-out);
            overflow-y: auto;
            padding: var(--s5);
            display: flex; flex-direction: column; gap: var(--s4);
        }
        #settings-panel.open { right: 0; }
        #settings-panel h2 {
            font-size: var(--font-lg); color: var(--text-primary);
            padding-bottom: var(--s3); border-bottom: 1px solid var(--border-default);
            display: flex; justify-content: space-between; align-items: center;
            margin: 0;
        }
        .setting-group {
            background: var(--bg-surface);
            border: 1px solid var(--border-default);
            border-radius: var(--r-lg);
            padding: var(--s4);
        }
        .setting-group .group-title {
            font-size: var(--font-xs); color: var(--text-tertiary);
            text-transform: uppercase; letter-spacing: 0.06em;
            margin-bottom: var(--s3); font-weight: 600;
        }
        .setting-group label {
            display: flex; justify-content: space-between; align-items: center;
            font-size: var(--font-sm); color: var(--text-primary);
            margin-bottom: var(--s3);
        }
        .setting-group label:last-child { margin-bottom: 0; }

        .toggle {
            position: relative; width: 44px; height: 24px;
            background: var(--bg-elevated); border-radius: var(--r-full); cursor: pointer;
            transition: background var(--duration-normal) var(--ease-out); flex-shrink: 0;
        }
        .toggle.active { background: var(--accent); }
        .toggle::after {
            content: '';
            position: absolute; top: 2px; left: 2px;
            width: 20px; height: 20px;
            background: #fff; border-radius: 50%;
            transition: transform var(--duration-normal) var(--ease-out);
        }
        .toggle.active::after { transform: translateX(20px); }

        input[type="range"] { width: 100%; accent-color: var(--accent); }
        #settings-panel select {
            width: 100%; padding: var(--s2) var(--s3);
            background: var(--bg-surface); border: 1px solid var(--border-default);
            color: var(--text-primary); border-radius: var(--r-md); font-size: var(--font-sm);
        }
        .btn {
            padding: var(--s3) var(--s4); border: none; border-radius: var(--r-md);
            font-size: var(--font-sm); font-weight: 600; cursor: pointer;
            transition: all var(--duration-normal) var(--ease-out);
        }
        .btn:hover { filter: brightness(1.15); }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { filter: brightness(1.15); }
        .btn-danger { background: var(--red); color: #fff; border: none; }
        .btn-danger:hover { filter: brightness(1.15); }

        /* CHORD POPUP */
        #chord-popup {
            display: none;
            position: fixed;
            z-index: 20000;
            background: var(--bg-elevated);
            border: 1px solid var(--border-default);
            border-radius: var(--r-xl);
            padding: var(--s2);
            box-shadow: var(--shadow-lg);
            pointer-events: auto;
        }
        .popup-close {
            background: none; border: none; color: var(--text-tertiary);
            font-size: var(--font-lg); cursor: pointer;
            transition: color var(--duration-fast) ease;
        }
        .popup-close:hover { color: var(--text-primary); }
        #chord-popup .popup-close {
            position: absolute; top: var(--s1); right: var(--s2);
            font-size: var(--font-sm);
        }
        #chord-popup .no-diagram {
            padding: var(--s5) var(--s4);
            color: var(--text-tertiary); font-size: var(--font-xs); text-align: center;
        }

        .chord.clickable { cursor: pointer; }
        .chord.clickable:hover { text-decoration: underline; }

        @media (max-width: 600px) {
            #settings-panel { width: 100%; right: -100%; }
        }

        /* Light theme overrides */
        [data-theme="light"] #current-slide .chord {
            text-shadow: none;
        }
        [data-theme="light"] #conf-timer {
            color: var(--text-primary);
        }
        [data-theme="light"] #conf-message {
            color: var(--amber);
        }
    </style>
</head>
<body>

    <button id="fs-btn" onclick="toggleFullscreen()">⛶</button>
    <button id="settings-btn" onclick="toggleSettings()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>

    <div id="worship-view">
        <div id="current-slide">
            <img id="stage-logo" src="{{ url_for('static', filename='logo.png') }}">
            <div id="current-content" class="text-wrapper"></div>
        </div>

        <div id="next-slide-container">
            <div class="meta-info-container">
                <div id="realtime-clock">00:00</div>
                <div id="key-display"></div>
                <div id="capo-display"></div>
                <div id="bpm-display"></div>
            </div>

            <div id="next-label" data-t="bm_next_label">NASTĘPNIE:</div>
            <div id="next-content">
                <div id="next-text-inner" class="text-wrapper"></div>
            </div>
        </div>
    </div>

    <div id="conference-view">
        <div id="conf-timer">00:00</div>
        <div id="conf-message"></div>
    </div>

    <!-- CHORD POPUP -->
    <div id="chord-popup">
        <button class="popup-close" onclick="hideChordPopup()">✕</button>
        <div id="chord-popup-content"></div>
    </div>

    <!-- PANEL USTAWIEŃ -->
    <div id="settings-overlay" onclick="toggleSettings()"></div>
    <div id="settings-panel">
        <h2>
            <span data-t="bm_settings">Ustawienia</span>
            <button class="popup-close" onclick="toggleSettings()">✕</button>
        </h2>

        <div class="setting-group">
            <div class="group-title">Preset</div>
            <select id="preset-select" onchange="loadPreset(this.value)">
                <option value="" data-t="bm_choose_preset">— Wybierz preset —</option>
                {% for p in presets %}
                <option value="{{ p.id }}" data-cfg='{{ {"show_chords": p.show_chords, "chord_notation": p.chord_notation or "international", "lowercase_minor": p.lowercase_minor or false, "capo_fret": p.capo_fret, "beginner_mode": p.beginner_mode, "diagram_instrument": p.diagram_instrument, "font_size": p.font_size}|tojson }}'>{{ p.name }}</option>
                {% endfor %}
            </select>
            <div style="display:flex; gap:var(--s2); margin-top:var(--s3);">
                <button class="btn btn-primary" style="flex:1;" onclick="savePresetDialog()" data-t="bm_save">Zapisz</button>
                <button class="btn btn-danger" onclick="deleteCurrentPreset()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
            </div>
        </div>

        <div class="setting-group">
            <div class="group-title" data-t="bm_chords_group">Akordy</div>
            <label>
                <span data-t="bm_show_chords">Pokaż akordy</span>
                <div class="toggle active" id="tog-chords" onclick="toggleOpt('show_chords')"></div>
            </label>
            <label>
                <span data-t="bm_notation">Notacja</span>
                <select id="chord-notation" onchange="setNotation(this.value)" style="margin-left:auto; padding:var(--s1) var(--s2); border-radius:var(--r-md); background:var(--bg-surface); color:var(--text-primary); border:1px solid var(--border-default);">
                    <option value="international" data-t="bm_intl">Międzynarodowa (Bb, B)</option>
                    <option value="polish" data-t="bm_polish">Polska (B, H)</option>
                    <option value="nashville" data-t="bm_nashville">Nashville (1-2-3)</option>
                </select>
            </label>
            <label>
                <span data-t="bm_lowercase_minor">Małe litery = mol</span>
                <div class="toggle" id="tog-lowercase-minor" onclick="toggleOpt('lowercase_minor')"></div>
            </label>
            <label>
                <span data-t="bm_beginner">Tryb początkującego</span>
                <div class="toggle" id="tog-beginner" onclick="toggleOpt('beginner_mode')"></div>
            </label>
            <label>
                <span data-t="bm_diagrams">Diagramy chwytów</span>
                <select id="diagram-instrument" onchange="setDiagramInstrument(this.value)" style="margin-left:auto; padding:var(--s1) var(--s2); border-radius:var(--r-md); background:var(--bg-surface); color:var(--text-primary); border:1px solid var(--border-default);">
                    <option value="off" data-t="bm_off">Wyłączone</option>
                    <option value="guitar" selected data-t="bm_guitar">Gitara</option>
                    <option value="piano" data-t="bm_piano">Piano</option>
                </select>
            </label>
        </div>

        <div class="setting-group">
            <div class="group-title" data-t="bm_capo_group">Kapodaster</div>
            <label>
                <span data-t="bm_capo_fret">Próg kapo</span>
                <select id="capo-select" onchange="setCapo(+this.value)">
                    <option value="0" data-t="bm_none">Brak</option>
                    {% for i in range(1, 13) %}
                    <option value="{{ i }}">{{ i }}</option>
                    {% endfor %}
                </select>
            </label>
            <div id="capo-suggestion" style="margin-top:var(--s3); padding:var(--s3); background:rgba(45,212,191,0.05); border:1px solid rgba(45,212,191,0.2); border-radius:var(--r-md); font-size:var(--font-xs); color:var(--text-tertiary); display:none;">
                <div style="color:var(--teal); font-weight:bold; margin-bottom:var(--s1);" id="capo-suggest-title"></div>
                <div id="capo-suggest-details"></div>
            </div>
        </div>

        <div class="setting-group">
            <div class="group-title" data-t="bm_font_size">Rozmiar czcionki</div>
            <label>
                <span id="font-size-val">8</span> vh
            </label>
            <input type="range" id="font-size-range" min="4" max="14" step="0.5" value="8" oninput="setFontSize(+this.value)">
        </div>
    </div>

    <script>
        var socket;
        try { socket = io(); } catch(e) { socket = { on: function(){}, emit: function(){} }; }
        const worshipView = document.getElementById('worship-view');
        const confView = document.getElementById('conference-view');
        const currentContent = document.getElementById('current-content');
        const stageLogo = document.getElementById('stage-logo');

        // ===== SETTINGS STATE =====
        let currentSettings = {
            show_chords: true,
            chord_notation: 'international',
            lowercase_minor: false,
            capo_fret: 0,
            beginner_mode: false,
            diagram_instrument: 'guitar',
            font_size: 8
        };
        let currentRawText = '';
        let currentRawNext = '';
        let currentBandHtml = '';
        let currentBandNext = '';
        let currentKey = 'C';
        let currentBpm = 0;
        let activePresetId = null;

        // ===== MUSIC THEORY =====
        const NOTES = ['C', 'C#', 'D', 'Eb', 'E', 'F', 'F#', 'G', 'Ab', 'A', 'Bb', 'B'];
        const NOTES_PL = ['C', 'Cis', 'D', 'Es', 'E', 'F', 'Fis', 'G', 'As', 'A', 'B', 'H'];

        const NOTE_MAP_INT = {};
        NOTES.forEach((n, i) => NOTE_MAP_INT[n] = i);
        Object.assign(NOTE_MAP_INT, {
            'Db': 1, 'D#': 3, 'E#': 5, 'Fb': 4, 'Gb': 6,
            'G#': 8, 'A#': 10, 'B#': 0, 'Cb': 11
        });
        const NOTE_MAP_PL = {};
        NOTES_PL.forEach((n, i) => NOTE_MAP_PL[n] = i);
        Object.assign(NOTE_MAP_PL, {
            'Cis': 1, 'Dis': 3, 'Es': 3, 'Fis': 6, 'Gis': 8, 'As': 8, 'Ais': 10, 'His': 0, 'H': 11, 'B': 10
        });

        const CHORD_RE = /^([AaEe][Ss](?![uU])|[A-Ha-h][#b]?(?:is|IS|Is)?)(.*)$/;

        function parseRoot(str) {
            const m = str.match(CHORD_RE);
            return m ? { root: m[1], suffix: m[2] } : null;
        }

        function rootToPitch(root) {
            let r = root.charAt(0).toUpperCase() + root.slice(1);
            if (NOTE_MAP_INT[r] !== undefined) return NOTE_MAP_INT[r];
            if (NOTE_MAP_PL[r] !== undefined) return NOTE_MAP_PL[r];
            return null;
        }

        function pitchToNote(p) {
            return NOTES[((p % 12) + 12) % 12];
        }

        function transposeChord(chord, semi) {
            if (chord.includes('/')) {
                const parts = chord.split('/');
                return transposeChord(parts[0], semi) + '/' + transposeChord(parts.slice(1).join('/'), semi);
            }
            const p = parseRoot(chord);
            if (!p) return chord;
            const pc = rootToPitch(p.root);
            if (pc === null) return chord;
            return NOTES[((pc + semi) % 12 + 12) % 12] + p.suffix;
        }

        function simplifyChord(chord) {
            if (chord.includes('/')) chord = chord.split('/')[0];
            const p = parseRoot(chord);
            if (!p) return chord;
            const isMinor = /^m(?!aj)/i.test(p.suffix);
            return p.root + (isMinor ? 'm' : '');
        }

        function toNashville(chord, keyRoot) {
            if (chord.includes('/')) {
                const parts = chord.split('/');
                return toNashville(parts[0], keyRoot) + '/' + toNashville(parts.slice(1).join('/'), keyRoot);
            }
            const p = parseRoot(chord);
            if (!p) return chord;
            const pc = rootToPitch(p.root);
            const kpc = rootToPitch(keyRoot);
            if (pc === null || kpc === null) return chord;
            const interval = ((pc - kpc) % 12 + 12) % 12;
            const NASH = {0:'1',1:'♭2',2:'2',3:'♭3',4:'3',5:'4',6:'♭5',7:'5',8:'♭6',9:'6',10:'♭7',11:'7'};
            let num = NASH[interval];
            let suffix = p.suffix;
            if (/^m(?!aj)/i.test(suffix)) { suffix = suffix.replace(/^m/i, ''); num += 'm'; }
            if (suffix) num += suffix;
            return num;
        }

        function isHardChord(chordDisplay) {
            if (!chordDisplay) return false;
            const base = chordDisplay.includes('/') ? chordDisplay.split('/')[0] : chordDisplay;
            const p = parseRoot(base);
            if (!p) return false;
            const simple = p.root + (/^m(?!aj)/i.test(p.suffix) ? 'm' : '');
            return !EASY_CHORDS.has(simple);
        }

        function convertNotation(chord) {
            if (chord.includes('/')) {
                const parts = chord.split('/');
                return convertNotation(parts[0]) + '/' + convertNotation(parts.slice(1).join('/'));
            }
            const p = parseRoot(chord);
            if (!p) return chord;
            const pc = rootToPitch(p.root);
            if (pc === null) return chord;
            const notation = currentSettings.chord_notation || 'international';
            const table = notation === 'polish' ? NOTES_PL : NOTES;
            let newRoot = table[((pc % 12) + 12) % 12];
            let suffix = p.suffix;
            const isMinor = /^m(?!aj)/i.test(suffix);
            if (currentSettings.lowercase_minor) {
                if (isMinor) {
                    newRoot = newRoot[0].toLowerCase() + newRoot.slice(1);
                    suffix = suffix.replace(/^m/i, '');
                }
            }
            return newRoot + suffix;
        }

        function processChord(chord) {
            let display = chord;
            let cls = 'chord';
            if (currentSettings.capo_fret > 0) {
                display = transposeChord(display, -currentSettings.capo_fret);
                cls += ' capo';
            }
            if (currentSettings.beginner_mode) display = simplifyChord(display);
            const notation = currentSettings.chord_notation || 'international';
            if (notation === 'nashville') {
                display = toNashville(display, currentKey.replace('m', ''));
                cls = 'chord nashville';
                if (currentSettings.lowercase_minor) {
                    display = applyLowercaseMinorNashville(display);
                }
            } else {
                display = convertNotation(display);
            }
            if (notation !== 'nashville' && currentSettings.beginner_mode && isHardChord(display)) cls += ' hard-chord';
            return { display, cls };
        }

        function applyLowercaseMinorNashville(nashStr) {
            if (nashStr.includes('/')) {
                const parts = nashStr.split('/');
                return applyLowercaseMinorNashville(parts[0]) + '/' + applyLowercaseMinorNashville(parts.slice(1).join('/'));
            }
            const m = nashStr.match(/^([♭#]*\d+)(m)(.*)$/);
            if (m) return m[1].toLowerCase() + m[3];
            return nashStr;
        }

        // ===== CAPO SUGGESTION =====
        const EASY_CHORDS = new Set(['C','G','D','A','E','Am','Em','Dm','F','Bm']);

        function extractChords(rawText) {
            if (!rawText) return [];
            const matches = rawText.match(/\[(.*?)\]/g);
            if (!matches) return [];
            const unique = new Set();
            for (const m of matches) {
                let ch = m.slice(1, -1);
                if (ch.includes('/')) ch = ch.split('/')[0];
                const p = parseRoot(ch);
                if (p) unique.add(ch);
            }
            return [...unique];
        }

        function chordSimplifiedRoot(chord) {
            const p = parseRoot(chord);
            if (!p) return chord;
            const pc = rootToPitch(p.root);
            if (pc === null) return chord;
            const note = pitchToNote(pc);
            const isMinor = /^m(?!aj)/i.test(p.suffix);
            return note + (isMinor ? 'm' : '');
        }

        function suggestCapo() {
            const box = document.getElementById('capo-suggestion');
            const chords = extractChords(currentRawText);
            if (chords.length === 0) { box.style.display = 'none'; return; }

            let bestCapo = 0;
            let bestScore = -1;
            let bestChords = [];

            for (let capo = 0; capo <= 7; capo++) {
                const transposed = chords.map(ch => {
                    const simple = simplifyChord(transposeChord(ch, -capo));
                    return chordSimplifiedRoot(simple);
                });
                const uniqueT = [...new Set(transposed)];
                const easyCount = uniqueT.filter(c => EASY_CHORDS.has(c)).length;
                const score = easyCount / uniqueT.length;
                if (score > bestScore || (score === bestScore && capo < bestCapo)) {
                    bestScore = score;
                    bestCapo = capo;
                    bestChords = uniqueT;
                }
            }

            if (bestCapo === 0 && bestScore >= 1) {
                box.style.display = 'block';
                document.getElementById('capo-suggest-title').textContent = t('bm_capo_simple');
                document.getElementById('capo-suggest-details').textContent = bestChords.join(', ');
            } else if (bestCapo > 0) {
                box.style.display = 'block';
                document.getElementById('capo-suggest-title').textContent = t('bm_capo_suggest') + ' ' + bestCapo;
                document.getElementById('capo-suggest-details').innerHTML =
                    t('bm_capo_chords') + ' ' + bestCapo + ': <span style="color:var(--text-primary);">' + bestChords.join(', ') + '</span>';
            } else {
                box.style.display = 'none';
            }
        }

        // ===== RENDERING =====
        // Use server-generated HTML (same as stage view) and transform chords client-side
        function transformServerHtml(html) {
            if (!html) return '';

            const container = document.createElement('div');
            container.innerHTML = html;

            if (!currentSettings.show_chords) {
                container.querySelectorAll('.chord-wrapper').forEach(el => el.remove());
                return container.innerHTML;
            }
            const chordEls = container.querySelectorAll('.chord');
            chordEls.forEach(el => {
                const rawChord = el.textContent;
                const { display, cls } = processChord(rawChord);

                el.className = cls;
                const isNashville = currentSettings.chord_notation === 'nashville';
                if (currentSettings.diagram_instrument !== 'off' && !isNashville) {
                    el.classList.add('clickable');
                    el.setAttribute('data-chord', rawChord);
                    el.setAttribute('data-chord-display', display);
                    el.setAttribute('onclick', 'showChordPopup(event, this.dataset.chord, this.dataset.chordDisplay)');
                }

                if (display.includes('/') && !isNashville) {
                    const parts = display.split('/');
                    el.innerHTML = parts[0] + "<span class='bass-slash'>/</span><span class='bass-note'>" + parts.slice(1).join('/') + "</span>";
                } else {
                    el.textContent = display;
                }
            });
            return container.innerHTML;
        }

        function fixChordOverlap(container) {
            if (!container) return;
            var chords = container.querySelectorAll('.chord');
            for (var i = 0; i < chords.length; i++) {
                chords[i].style.left = '0';
            }
            for (var i = 0; i < chords.length - 1; i++) {
                var curr = chords[i].getBoundingClientRect();
                var next = chords[i + 1].getBoundingClientRect();
                if (Math.abs(curr.top - next.top) > curr.height) continue;
                var gap = 6;
                if (curr.right + gap > next.left) {
                    var overlap = curr.right + gap - next.left;
                    var curLeft = parseFloat(chords[i].style.left) || 0;
                    chords[i].style.left = (curLeft - overlap) + 'px';
                }
            }
        }

        // Auto-Scale (same as stage)
        function fitText(containerId, contentId, maxVh, minVh) {
            const container = document.getElementById(containerId);
            const content = document.getElementById(contentId);
            if (!container || !content) return;
            if (container.style.display === 'none' || content.style.display === 'none') return;
            let size = maxVh;
            content.style.fontSize = size + 'vh';
            while (content.scrollHeight > container.clientHeight && size > minVh) {
                size -= 0.2;
                content.style.fontSize = size + 'vh';
            }
        }

            if (!doc.fullscreenElement && !doc.mozFullScreenElement && !doc.webkitFullscreenElement && !doc.msFullscreenElement) {

                if (cancel) cancel.call(doc);

        // ===== CHORD POPUP =====
        function showChordPopup(event, chordName, displayName) {
            event.stopPropagation();
            const popup = document.getElementById('chord-popup');
            const content = document.getElementById('chord-popup-content');
            const label = displayName || chordName;

            const inst = currentSettings.diagram_instrument;
            let html = '';

            if (inst === 'guitar') {
                const guitarName = chordName.includes('/') ? chordName.split('/')[0] : chordName;
                const data = lookupChord(guitarName);
                html = data ? renderChordSVG(label, data) : `<div class="no-diagram"><strong>${label}</strong><br>${t('bm_no_diagram')}</div>`;
            } else {
                const notes = lookupPianoChord(chordName);
                html = notes ? renderPianoSVG(label, notes) : `<div class="no-diagram"><strong>${label}</strong><br>${t('bm_no_diagram')}</div>`;
            }

            content.innerHTML = html;
            popup.style.display = 'block';

            const rect = event.target.getBoundingClientRect();
            const popupW = inst === 'piano' ? 220 : 140;
            let x = rect.left + rect.width / 2 - popupW / 2;
            let y = rect.bottom + 8;

            if (x < 8) x = 8;
            if (x + popupW > window.innerWidth) x = window.innerWidth - popupW - 8;
            if (y + 180 > window.innerHeight) y = rect.top - 180;

            popup.style.left = x + 'px';
            popup.style.top = y + 'px';
        }

            const payload = { ...currentSettings, name };

            fetch('/api/presets', {

                        var tr = bmTip.getBoundingClientRect(), tw = tr.width, th = tr.height, G = 16;
                        var top, left;
                        switch (s.position) {
                            case 'bottom': top = r.bottom + G; left = r.left + r.width / 2 - tw / 2; break;
                            case 'top': top = r.top - th - G; left = r.left + r.width / 2 - tw / 2; break;
                            case 'left': top = r.top + r.height / 2 - th / 2; left = r.left - tw - G; break;
                            case 'right': top = r.top + r.height / 2 - th / 2; left = r.right + G; break;
                            default: top = r.bottom + G; left = r.left;
                        }
                        var vw = window.innerWidth, vh = window.innerHeight;
                        if (left < 10) left = 10; if (left + tw > vw - 10) left = vw - tw - 10;
                        if (top < 10) top = 10; if (top + th > vh - 10) top = vh - th - 10;
                        bmTip.style.top = top + 'px'; bmTip.style.left = left + 'px'; bmTip.style.visibility = '';
                        requestAnimationFrame(function() { bmTip.classList.add('visible'); });

                        if (s.interactive) {
                            var iEl = document.querySelector(s.target);
                            if (iEl) {
                                iEl.style.zIndex = '100001';
                                var handler = function() { if (s.afterInteract) s.afterInteract(); setTimeout(function() { bmShow(idx + 1); }, 300); };
                                iEl.addEventListener('click', handler);
                                bmInteract = { el: iEl, fn: handler };
                            }
                        }
                    }, 300);
                }, 100);
            }

            // Inject styles (reuse control panel onboarding CSS)
            var style = document.createElement('style');
            style.textContent = '.onboarding-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:99990;opacity:0;transition:opacity .3s;pointer-events:all}.onboarding-overlay.active{opacity:1}.onboarding-spotlight{position:fixed;z-index:99995;border-radius:12px;box-shadow:0 0 0 9999px rgba(0,0,0,0.65);pointer-events:none;transition:all .35s cubic-bezier(.4,0,.2,1);display:none}.onboarding-spotlight::after{content:"";position:absolute;inset:-4px;border-radius:14px;border:2px solid var(--accent-primary,#6366f1);animation:onboarding-pulse 2s ease-in-out infinite}@keyframes onboarding-pulse{0%,100%{opacity:.6}50%{opacity:1}}.onboarding-tooltip{position:fixed;z-index:100000;background:var(--bg-elevated,#1e293b);border:1px solid var(--border-default,#334155);border-radius:14px;padding:20px 24px;max-width:340px;min-width:260px;box-shadow:0 20px 60px rgba(0,0,0,.4);opacity:0;transform:translateY(8px);transition:all .25s}.onboarding-tooltip.visible{opacity:1;transform:translateY(0)}.onboarding-tooltip-arrow{position:absolute;width:12px;height:12px;background:var(--bg-elevated,#1e293b);border:1px solid var(--border-default,#334155);transform:rotate(45deg)}.arrow-top{top:-7px;left:50%;margin-left:-6px;border-right:none;border-bottom:none}.arrow-bottom{bottom:-7px;left:50%;margin-left:-6px;border-left:none;border-top:none}.arrow-left{left:-7px;top:50%;margin-top:-6px;border-top:none;border-right:none}.arrow-right{right:-7px;top:50%;margin-top:-6px;border-bottom:none;border-left:none}.onboarding-step-counter{font-size:.7rem;color:var(--text-tertiary,#64748b);margin-bottom:8px;letter-spacing:1px;font-weight:600}.onboarding-tooltip h3{margin:0 0 6px;font-size:1rem;color:var(--text-primary,#f1f5f9)}.onboarding-tooltip p{margin:0 0 16px;font-size:.85rem;line-height:1.5;color:var(--text-secondary,#94a3b8)}.onboarding-btn-row{display:flex;gap:8px;align-items:center}.onboarding-btn-primary{padding:8px 20px;background:var(--accent-primary,#6366f1);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:.8rem;font-weight:600}.onboarding-btn-primary:hover{filter:brightness(1.1)}.onboarding-btn-ghost{padding:8px 14px;background:transparent;color:var(--text-secondary,#94a3b8);border:1px solid var(--border-default,#334155);border-radius:8px;cursor:pointer;font-size:.8rem}.onboarding-btn-ghost:hover{background:rgba(255,255,255,.05)}.onboarding-btn-skip{padding:4px 10px;background:transparent;color:var(--text-tertiary,#64748b);border:none;cursor:pointer;font-size:.7rem;margin-left:auto}.onboarding-btn-skip:hover{color:var(--text-secondary,#94a3b8)}';
            document.head.appendChild(style);

            setTimeout(function() {
                bmOverlay = document.createElement('div'); bmOverlay.className = 'onboarding-overlay';
                bmOverlay.addEventListener('click', function(e) { if (e.target === bmOverlay) bmShow(bmStep + 1); });
                document.body.appendChild(bmOverlay);
                bmSpot = document.createElement('div'); bmSpot.className = 'onboarding-spotlight'; document.body.appendChild(bmSpot);
                bmTip = document.createElement('div'); bmTip.className = 'onboarding-tooltip'; document.body.appendChild(bmTip);
                requestAnimationFrame(function() { bmOverlay.classList.add('active'); });
                setTimeout(function() { bmShow(0); }, 200);
            }, 800);
        })();
    </script>
</body>
</html>
