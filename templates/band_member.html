<!DOCTYPE html>
<html>
<head>
    <title>Widok Członka Zespołu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <style>
        @font-face {
            font-family: 'Sen';
            src: url("{{ url_for('static', filename='fonts/Sen-Regular.ttf') }}") format('truetype');
            font-weight: 400;
        }
        @font-face {
            font-family: 'Sen';
            src: url("{{ url_for('static', filename='fonts/Sen-Bold.ttf') }}") format('truetype');
            font-weight: 700;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0a0a0f;
            color: #e8e8e8;
            font-family: 'Sen', sans-serif;
            height: 100vh; width: 100vw;
            overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* TOP BAR */
        #top-bar {
            height: 48px; min-height: 48px;
            background: #151520;
            border-bottom: 1px solid #2a2a3a;
            display: flex; align-items: center;
            padding: 0 12px;
            gap: 10px;
            z-index: 100;
        }

        #top-bar .song-title {
            flex: 1;
            font-size: 16px; font-weight: 700;
            color: #fff;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        #top-bar .meta {
            font-size: 13px; color: #888;
            font-family: monospace;
            display: flex; gap: 12px; align-items: center;
        }

        #top-bar .meta .key-badge {
            background: #00e5ff22; color: #00e5ff;
            padding: 2px 8px; border-radius: 4px; font-weight: bold;
        }

        #top-bar .meta .bpm-badge {
            background: #fb634022; color: #fb6340;
            padding: 2px 8px; border-radius: 4px;
        }

        #top-bar .meta .capo-badge {
            background: #ffd60022; color: #ffd600;
            padding: 2px 8px; border-radius: 4px;
            display: none;
        }

        .icon-btn {
            background: none; border: none; color: #888;
            font-size: 22px; cursor: pointer; padding: 4px 8px;
            border-radius: 6px; transition: all 0.2s;
        }
        .icon-btn:hover { color: #fff; background: #ffffff15; }

        /* MAIN CONTENT */
        #main-content {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px 80px 20px;
            scroll-behavior: smooth;
        }

        #lyrics-container {
            max-width: 900px;
            margin: 0 auto;
            line-height: 2.4;
        }

        #lyrics-container .section-block {
            margin-bottom: 28px;
        }

        .chord-line {
            position: relative;
            display: inline;
        }

        .chord-wrapper {
            display: inline-block;
            position: relative;
            vertical-align: baseline;
        }

        .chord {
            position: absolute;
            bottom: 0.8em;
            left: 0;
            color: #00e5ff;
            font-weight: 700;
            font-size: 0.7em;
            white-space: nowrap;
            text-shadow: 1px 1px 2px #000;
            transition: color 0.3s;
        }

        .chord.nashville { color: #ffd600; }
        .chord.capo { color: #69f0ae; }

        .chord-only-line .chord {
            position: static;
            font-size: 1em;
            display: inline-block;
            margin-right: 0.5em;
        }

        .bass-slash { color: #ff6b6b; opacity: 0.8; }
        .bass-note { color: #ff4d4d; font-weight: 800; }

        /* LOGO */
        #logo-view {
            display: flex;
            align-items: center; justify-content: center;
            height: 100%;
        }
        #logo-view img {
            max-width: 50%; max-height: 50%; object-fit: contain;
        }

        /* CONFERENCE VIEW */
        #conf-view {
            display: none;
            flex-direction: column;
            align-items: center; justify-content: center;
            height: 100%; text-align: center;
        }
        #conf-view .timer { font-size: 18vh; font-weight: bold; font-family: monospace; }
        #conf-view .message { font-size: 5vh; color: yellow; margin-top: 20px; }

        /* SETTINGS PANEL */
        #settings-overlay {
            display: none;
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 500;
        }

        #settings-panel {
            position: fixed; top: 0; right: -360px;
            width: 340px; height: 100%;
            background: #1a1a28;
            border-left: 1px solid #333;
            z-index: 600;
            transition: right 0.3s ease;
            overflow-y: auto;
            padding: 20px;
            display: flex; flex-direction: column; gap: 16px;
        }

        #settings-panel.open { right: 0; }

        #settings-panel h2 {
            font-size: 18px; color: #fff;
            padding-bottom: 10px; border-bottom: 1px solid #333;
            display: flex; justify-content: space-between; align-items: center;
        }

        .setting-group {
            background: #22223a;
            border-radius: 10px;
            padding: 14px;
        }

        .setting-group label {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 14px; color: #ccc;
            margin-bottom: 10px;
        }

        .setting-group label:last-child { margin-bottom: 0; }

        .setting-group .group-title {
            font-size: 12px; color: #888;
            text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 10px;
        }

        /* Toggle switch */
        .toggle {
            position: relative; width: 44px; height: 24px;
            background: #444; border-radius: 12px; cursor: pointer;
            transition: background 0.3s;
        }
        .toggle.active { background: #00e5ff; }
        .toggle::after {
            content: '';
            position: absolute; top: 2px; left: 2px;
            width: 20px; height: 20px;
            background: #fff; border-radius: 50%;
            transition: transform 0.3s;
        }
        .toggle.active::after { transform: translateX(20px); }

        /* Range */
        input[type="range"] {
            width: 100%; accent-color: #00e5ff;
        }

        select, input[type="text"] {
            width: 100%; padding: 8px 10px;
            background: #2a2a44; border: 1px solid #444;
            color: #fff; border-radius: 6px; font-size: 14px;
        }

        /* Preset buttons */
        .preset-bar {
            display: flex; gap: 8px; flex-wrap: wrap;
        }

        .preset-chip {
            padding: 6px 14px;
            background: #2a2a44; border: 1px solid #444;
            border-radius: 20px; color: #ccc;
            font-size: 13px; cursor: pointer;
            transition: all 0.2s;
            display: flex; align-items: center; gap: 6px;
        }
        .preset-chip:hover { background: #3a3a5a; color: #fff; }
        .preset-chip.active { background: #00e5ff33; border-color: #00e5ff; color: #00e5ff; }
        .preset-chip .del {
            font-size: 11px; opacity: 0.5; cursor: pointer;
        }
        .preset-chip .del:hover { opacity: 1; color: #f5365c; }

        .btn {
            padding: 10px 16px;
            border: none; border-radius: 8px;
            font-size: 14px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-primary { background: #00e5ff; color: #000; }
        .btn-primary:hover { background: #00b8d4; }
        .btn-danger { background: #f5365c22; color: #f5365c; border: 1px solid #f5365c44; }
        .btn-danger:hover { background: #f5365c44; }
        .btn-outline { background: none; color: #aaa; border: 1px solid #444; }
        .btn-outline:hover { background: #ffffff10; color: #fff; }

        /* Fullscreen button */
        #fs-btn {
            position: fixed; bottom: 12px; right: 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white; font-size: 18px;
            padding: 8px 12px; cursor: pointer;
            z-index: 9999; border-radius: 8px;
            opacity: 0.4; transition: opacity 0.3s;
        }
        #fs-btn:hover { opacity: 1; }

        @media (max-width: 600px) {
            #settings-panel { width: 100%; right: -100%; }
            #main-content { padding: 16px 12px 80px 12px; }
            #lyrics-container { line-height: 2.2; }
        }
    </style>
</head>
<body>

    <div id="top-bar">
        <span class="song-title" id="song-title">—</span>
        <div class="meta">
            <span class="key-badge" id="key-badge" style="display:none"></span>
            <span class="capo-badge" id="capo-badge"></span>
            <span class="bpm-badge" id="bpm-badge" style="display:none"></span>
        </div>
        <button class="icon-btn" onclick="toggleSettings()" title="Ustawienia">⚙</button>
    </div>

    <div id="main-content">
        <div id="logo-view">
            <img src="{{ url_for('static', filename='logo.png') }}">
        </div>
        <div id="lyrics-container" style="display:none"></div>
        <div id="conf-view">
            <div class="timer" id="bm-conf-timer">00:00</div>
            <div class="message" id="bm-conf-msg"></div>
        </div>
    </div>

    <div id="settings-overlay" onclick="toggleSettings()"></div>
    <div id="settings-panel">
        <h2>
            Ustawienia
            <button class="icon-btn" onclick="toggleSettings()" style="font-size:18px;">✕</button>
        </h2>

        <div class="setting-group">
            <div class="group-title">Preset</div>
            <select id="preset-select" onchange="loadPreset(this.value)">
                <option value="">— Wybierz preset —</option>
                {% for p in presets %}
                <option value="{{ p.id }}" data-cfg='{{ {"show_chords": p.show_chords, "nashville_mode": p.nashville_mode, "capo_fret": p.capo_fret, "beginner_mode": p.beginner_mode, "font_size": p.font_size}|tojson }}'>{{ p.name }}</option>
                {% endfor %}
            </select>
            <div style="display:flex; gap:8px; margin-top:10px;">
                <button class="btn btn-primary" style="flex:1;" onclick="savePresetDialog()">💾 Zapisz preset</button>
                <button class="btn btn-danger" onclick="deleteCurrentPreset()">🗑</button>
            </div>
        </div>

        <div class="setting-group">
            <div class="group-title">Akordy</div>
            <label>
                Pokaż akordy
                <div class="toggle active" id="tog-chords" onclick="toggleOpt('show_chords')"></div>
            </label>
            <label>
                Nashville (1-2-3-4)
                <div class="toggle" id="tog-nashville" onclick="toggleOpt('nashville_mode')"></div>
            </label>
            <label>
                Tryb początkującego
                <div class="toggle" id="tog-beginner" onclick="toggleOpt('beginner_mode')"></div>
            </label>
        </div>

        <div class="setting-group">
            <div class="group-title">Kapodaster</div>
            <label>
                Próg kapo
                <select id="capo-select" onchange="setCapo(+this.value)">
                    <option value="0">Brak</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                    <option value="8">8</option>
                    <option value="9">9</option>
                    <option value="10">10</option>
                    <option value="11">11</option>
                    <option value="12">12</option>
                </select>
            </label>
        </div>

        <div class="setting-group">
            <div class="group-title">Wyświetlanie</div>
            <label>
                Rozmiar czcionki: <span id="font-size-val">6</span>vh
            </label>
            <input type="range" id="font-size-range" min="3" max="12" step="0.5" value="6" oninput="setFontSize(+this.value)">
        </div>
    </div>

    <button id="fs-btn" onclick="toggleFullscreen()">⛶</button>

    <script>
    var socket = io();

    // ===== STATE =====
    let currentSettings = {
        show_chords: true,
        nashville_mode: false,
        capo_fret: 0,
        beginner_mode: false,
        font_size: 6
    };

    let currentRawText = '';
    let currentRawNext = '';
    let currentKey = 'C';
    let currentBpm = 0;
    let activePresetId = null;

    // ===== MUSIC THEORY =====
    const NOTES = ['C', 'C#', 'D', 'Eb', 'E', 'F', 'F#', 'G', 'Ab', 'A', 'Bb', 'B'];
    const NOTE_MAP = {};
    NOTES.forEach((n, i) => NOTE_MAP[n] = i);
    // Aliases
    Object.assign(NOTE_MAP, {
        'Db': 1, 'D#': 3, 'E#': 5, 'Fb': 4, 'F#': 6, 'Gb': 6,
        'G#': 8, 'A#': 10, 'B#': 0, 'Cb': 11,
        // Polish
        'Cis': 1, 'Dis': 3, 'Es': 3, 'Fis': 6, 'Gis': 8, 'As': 8, 'Ais': 10, 'H': 11, 'B': 10,
        'His': 0
    });

    const CHORD_RE = /^([A-Ha-h][#b]?(?:is|IS|Is|es|ES|Es|s)?)(.*)$/;

    function parseRoot(chordStr) {
        const m = chordStr.match(CHORD_RE);
        if (!m) return null;
        return { root: m[1], suffix: m[2] };
    }

    function rootToPitch(root) {
        let r = root.charAt(0).toUpperCase() + root.slice(1);
        if (NOTE_MAP[r] !== undefined) return NOTE_MAP[r];
        r = root.toUpperCase();
        if (NOTE_MAP[r] !== undefined) return NOTE_MAP[r];
        return null;
    }

    function pitchToNote(p) {
        return NOTES[((p % 12) + 12) % 12];
    }

    function transposeChord(chordStr, semitones) {
        if (chordStr.includes('/')) {
            const parts = chordStr.split('/');
            return transposeChord(parts[0], semitones) + '/' + transposeChord(parts.slice(1).join('/'), semitones);
        }
        const parsed = parseRoot(chordStr);
        if (!parsed) return chordStr;
        const pc = rootToPitch(parsed.root);
        if (pc === null) return chordStr;
        const newPc = ((pc + semitones) % 12 + 12) % 12;
        return pitchToNote(newPc) + parsed.suffix;
    }

    function simplifyChord(chordStr) {
        if (chordStr.includes('/')) {
            chordStr = chordStr.split('/')[0];
        }
        const parsed = parseRoot(chordStr);
        if (!parsed) return chordStr;
        let suffix = parsed.suffix;
        const isMinor = /^m(?!aj)/i.test(suffix);
        const pc = rootToPitch(parsed.root);
        if (pc === null) return chordStr;
        return pitchToNote(pc) + (isMinor ? 'm' : '');
    }

    function toNashville(chordStr, keyRoot) {
        if (chordStr.includes('/')) {
            const parts = chordStr.split('/');
            return toNashville(parts[0], keyRoot) + '/' + toNashville(parts.slice(1).join('/'), keyRoot);
        }
        const parsed = parseRoot(chordStr);
        if (!parsed) return chordStr;
        const pc = rootToPitch(parsed.root);
        const keyPc = rootToPitch(keyRoot);
        if (pc === null || keyPc === null) return chordStr;
        const interval = ((pc - keyPc) % 12 + 12) % 12;
        const NASHVILLE = {0:'1', 1:'♭2', 2:'2', 3:'♭3', 4:'3', 5:'4', 6:'♭5', 7:'5', 8:'♭6', 9:'6', 10:'♭7', 11:'7'};
        let num = NASHVILLE[interval];
        let suffix = parsed.suffix;
        const isMinor = /^m(?!aj)/i.test(suffix);
        if (isMinor) {
            suffix = suffix.replace(/^m/i, '');
            num += 'm';
        }
        if (suffix && suffix !== '') num += suffix;
        return num;
    }

    function processChord(chordStr) {
        let display = chordStr;
        let cls = 'chord';

        if (currentSettings.capo_fret > 0) {
            display = transposeChord(display, -currentSettings.capo_fret);
            cls += ' capo';
        }

        if (currentSettings.beginner_mode) {
            display = simplifyChord(display);
        }

        if (currentSettings.nashville_mode) {
            let keyRoot = currentKey.replace('m', '');
            display = toNashville(display, keyRoot);
            cls = 'chord nashville';
        }

        return { display, cls };
    }

    // ===== RENDERING =====
    function renderText(rawText) {
        if (!rawText) return '';
        const blocks = rawText.split(/\n\s*\n/);
        let html = '';

        for (const block of blocks) {
            if (!block.trim()) continue;
            const lines = block.trim().split('\n');
            let blockHtml = '';

            for (const line of lines) {
                const tokens = line.split(/(\[.*?\])/);
                let lineHtml = '';
                let hasText = false;
                let hasChord = false;

                for (const tok of tokens) {
                    if (tok.startsWith('[') && tok.endsWith(']')) {
                        hasChord = true;
                    } else if (tok.trim()) {
                        hasText = true;
                    }
                }

                const chordOnlyLine = hasChord && !hasText;

                for (const tok of tokens) {
                    if (tok.startsWith('[') && tok.endsWith(']')) {
                        const raw = tok.slice(1, -1);
                        if (!currentSettings.show_chords) continue;

                        const { display, cls } = processChord(raw);
                        let chordHtml = display;
                        if (display.includes('/') && !currentSettings.nashville_mode) {
                            const parts = display.split('/');
                            chordHtml = parts[0] + "<span class='bass-slash'>/</span><span class='bass-note'>" + parts.slice(1).join('/') + "</span>";
                        }

                        if (chordOnlyLine) {
                            lineHtml += `<span class="chord-only-line"><span class="${cls}">${chordHtml}</span></span>`;
                        } else {
                            lineHtml += `<span class="chord-wrapper"><span class="${cls}">${chordHtml}</span></span>`;
                        }
                    } else {
                        lineHtml += tok.replace(/  /g, '&nbsp;&nbsp;');
                    }
                }

                blockHtml += lineHtml + '<br>';
            }

            html += `<div class="section-block">${blockHtml}</div>`;
        }

        return html;
    }

    function rerender() {
        const container = document.getElementById('lyrics-container');
        if (container.style.display === 'none') return;
        container.innerHTML = renderText(currentRawText);
        container.style.fontSize = currentSettings.font_size + 'vh';

        // Update capo badge
        const capoBadge = document.getElementById('capo-badge');
        if (currentSettings.capo_fret > 0) {
            capoBadge.textContent = 'Capo ' + currentSettings.capo_fret;
            capoBadge.style.display = 'inline';
        } else {
            capoBadge.style.display = 'none';
        }
    }

    // ===== SOCKET EVENTS =====
    socket.on('update_slide', function(data) {
        const logoView = document.getElementById('logo-view');
        const lyricsContainer = document.getElementById('lyrics-container');
        const confView = document.getElementById('conf-view');

        if (data.mode === 'logo') {
            logoView.style.display = 'flex';
            lyricsContainer.style.display = 'none';
            confView.style.display = 'none';
            document.getElementById('song-title').textContent = '—';
            document.getElementById('key-badge').style.display = 'none';
            document.getElementById('bpm-badge').style.display = 'none';
        }
        else if (data.mode === 'blackout') {
            // Freeze current view
        }
        else if (data.mode === 'conference') {
            logoView.style.display = 'none';
            lyricsContainer.style.display = 'none';
            confView.style.display = 'flex';
            document.getElementById('bm-conf-timer').textContent = data.timer;
            document.getElementById('bm-conf-timer').style.color = data.timer_color;
            document.getElementById('bm-conf-msg').textContent = data.message;
        }
        else {
            logoView.style.display = 'none';
            confView.style.display = 'none';
            lyricsContainer.style.display = 'block';

            if (data.raw_text !== undefined) {
                currentRawText = data.raw_text;
            }
            if (data.raw_next !== undefined) {
                currentRawNext = data.raw_next;
            }
            if (data.song_title) {
                document.getElementById('song-title').textContent = data.song_title;
            }
            if (data.current_key && data.current_key !== 'N/A') {
                currentKey = data.current_key;
                document.getElementById('key-badge').textContent = currentKey;
                document.getElementById('key-badge').style.display = 'inline';
            } else {
                document.getElementById('key-badge').style.display = 'none';
            }
            if (data.current_bpm && data.current_bpm > 0) {
                currentBpm = data.current_bpm;
                document.getElementById('bpm-badge').textContent = currentBpm + ' BPM';
                document.getElementById('bpm-badge').style.display = 'inline';
            } else {
                document.getElementById('bpm-badge').style.display = 'none';
            }

            rerender();

            // Scroll to top on new section
            document.getElementById('main-content').scrollTop = 0;
        }
    });

    socket.on('sync_state_to_client', function(state) {
        if (state.is_blackout) {
            // Keep current state frozen
        }
    });

    socket.on('refresh_logo', function() {
        location.reload();
    });

    // ===== SETTINGS UI =====
    function toggleSettings() {
        const panel = document.getElementById('settings-panel');
        const overlay = document.getElementById('settings-overlay');
        const open = panel.classList.toggle('open');
        overlay.style.display = open ? 'block' : 'none';
    }

    function toggleOpt(key) {
        currentSettings[key] = !currentSettings[key];
        updateToggles();
        rerender();
    }

    function updateToggles() {
        document.getElementById('tog-chords').classList.toggle('active', currentSettings.show_chords);
        document.getElementById('tog-nashville').classList.toggle('active', currentSettings.nashville_mode);
        document.getElementById('tog-beginner').classList.toggle('active', currentSettings.beginner_mode);
    }

    function setCapo(val) {
        currentSettings.capo_fret = val;
        rerender();
    }

    function setFontSize(val) {
        currentSettings.font_size = val;
        document.getElementById('font-size-val').textContent = val;
        rerender();
    }

    // ===== PRESETS =====
    function loadPreset(id) {
        if (!id) { activePresetId = null; return; }
        const opt = document.querySelector(`#preset-select option[value="${id}"]`);
        if (!opt) return;
        const cfg = JSON.parse(opt.dataset.cfg);
        currentSettings = { ...currentSettings, ...cfg };
        activePresetId = +id;

        document.getElementById('capo-select').value = currentSettings.capo_fret;
        document.getElementById('font-size-range').value = currentSettings.font_size;
        document.getElementById('font-size-val').textContent = currentSettings.font_size;
        updateToggles();
        rerender();
    }

    function savePresetDialog() {
        const name = prompt('Nazwa presetu:', activePresetId ? document.querySelector(`#preset-select option[value="${activePresetId}"]`)?.textContent : '');
        if (!name) return;

        const payload = { ...currentSettings, name };
        if (activePresetId) payload.id = activePresetId;

        fetch('/api/presets', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(r => r.json())
        .then(data => {
            activePresetId = data.id;
            refreshPresetList();
        });
    }

    function deleteCurrentPreset() {
        if (!activePresetId) return;
        if (!confirm('Usunąć ten preset?')) return;
        fetch('/api/presets/' + activePresetId, { method: 'DELETE' })
        .then(() => {
            activePresetId = null;
            refreshPresetList();
        });
    }

    function refreshPresetList() {
        fetch('/api/presets')
        .then(r => r.json())
        .then(presets => {
            const sel = document.getElementById('preset-select');
            sel.innerHTML = '<option value="">— Wybierz preset —</option>';
            for (const p of presets) {
                const opt = document.createElement('option');
                opt.value = p.id;
                opt.textContent = p.name;
                opt.dataset.cfg = JSON.stringify({
                    show_chords: p.show_chords,
                    nashville_mode: p.nashville_mode,
                    capo_fret: p.capo_fret,
                    beginner_mode: p.beginner_mode,
                    font_size: p.font_size
                });
                sel.appendChild(opt);
            }
            if (activePresetId) sel.value = activePresetId;
        });
    }

    // ===== FULLSCREEN =====
    function toggleFullscreen() {
        const doc = window.document;
        const docEl = doc.documentElement;
        const req = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
        const cancel = doc.exitFullscreen || doc.mozCancelFullScreen || doc.webkitExitFullscreen || doc.msExitFullscreen;
        if (!doc.fullscreenElement && !doc.mozFullScreenElement && !doc.webkitFullscreenElement && !doc.msFullscreenElement) {
            if (req) req.call(docEl).catch(() => {});
        } else {
            if (cancel) cancel.call(doc);
        }
    }

    // ===== INIT =====
    updateToggles();
    </script>
</body>
</html>
