<!DOCTYPE html>
<html>
<head>
    <title>Widok Członka Zespołu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/design-system.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="{{ url_for('static', filename='js/i18n.js') }}"></script>
    <script src="{{ url_for('static', filename='js/chord_diagrams.js') }}"></script>
    <style>
        @keyframes scaleIn {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        body {
            background-color: var(--bg-app);
            color: var(--text-primary);
            font-family: 'Sen', sans-serif;
            margin: 0; padding: 0;
            height: 100vh; width: 100vw;
            overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* PRZYCISKI GÓRNE */
        #fs-btn, #settings-btn, #setlist-btn {
            position: absolute;
            top: var(--s3);
            background: var(--glass-bg);
            border: 1px solid var(--border-default);
            color: var(--text-primary);
            font-size: 2vh;
            padding: var(--s2) var(--s3);
            cursor: pointer;
            z-index: 9999;
            border-radius: var(--r-md);
            opacity: 0.5;
            transition: all var(--duration-normal) var(--ease-out);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            backdrop-filter: blur(8px);
        }
        #fs-btn { right: var(--s3); }
        #settings-btn { right: 60px; }
        #setlist-btn { left: var(--s3); }
        #fs-btn:hover, #settings-btn:hover, #setlist-btn:hover { opacity: 1; filter: brightness(1.15); }
        #fs-btn:active, #settings-btn:active, #setlist-btn:active { transform: scale(0.97); }

        /* SETLIST DRAWER */
        #setlist-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.5); z-index: 9999;
        }
        #setlist-drawer {
            position: fixed; top: 0; left: -320px; bottom: 0; width: 300px;
            background: var(--bg-elevated); border-right: 1px solid var(--border-default);
            z-index: 10000; transition: left 0.3s var(--ease-out);
            display: flex; flex-direction: column; padding: 0;
        }
        #setlist-drawer.open { left: 0; }
        #setlist-drawer-header {
            padding: var(--s4) var(--s5);
            border-bottom: 1px solid var(--border-default);
            display: flex; align-items: center; justify-content: space-between;
        }
        #setlist-drawer-header h3 { margin: 0; font-size: var(--text-lg); color: var(--text-primary); }
        #setlist-drawer-close {
            background: none; border: none; color: var(--text-secondary);
            font-size: 1.4rem; cursor: pointer; padding: 4px 8px;
        }
        #setlist-song-list {
            flex: 1; overflow-y: auto; padding: var(--s2) 0;
        }
        .setlist-song-item {
            padding: var(--s3) var(--s5); cursor: pointer;
            border-bottom: 1px solid var(--border-subtle);
            transition: background 0.15s;
            display: flex; align-items: center; gap: var(--s3);
        }
        .setlist-song-item:hover { background: var(--bg-hover); }
        .setlist-song-item.active { background: var(--accent-primary); color: #fff; }
        .setlist-song-item.live-now::before {
            content: ''; width: 8px; height: 8px; border-radius: 50%;
            background: var(--accent-success); flex-shrink: 0;
            animation: livePulse 1.5s ease-in-out infinite;
        }
        .setlist-song-item-title { flex: 1; font-size: var(--text-sm); font-weight: 500; }
        .setlist-song-item-key { font-size: var(--text-xs); color: var(--text-tertiary); opacity: 0.7; }

        /* BROWSE MODE NAV */
        #browse-nav {
            display: none; position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--glass-bg); backdrop-filter: blur(12px);
            border-top: 1px solid var(--border-default);
            padding: var(--s2) var(--s4); z-index: 9998;
            align-items: center; justify-content: space-between; gap: var(--s3);
        }
        #browse-nav.visible { display: flex; }
        #browse-section-info {
            font-size: var(--text-xs); color: var(--text-secondary); white-space: nowrap;
            flex: 1; text-align: center;
        }
        .browse-nav-btn {
            background: var(--bg-element); border: 1px solid var(--border-default);
            color: var(--text-primary); padding: var(--s2) var(--s4);
            border-radius: var(--r-md); cursor: pointer; font-size: var(--text-sm);
            font-family: 'Sen', sans-serif;
        }
        .browse-nav-btn:hover { background: var(--bg-hover); }
        #browse-live-btn {
            background: var(--accent-success); color: #fff; border: none;
            padding: var(--s2) var(--s5); border-radius: var(--r-full);
            cursor: pointer; font-size: var(--text-sm); font-weight: 700;
            font-family: 'Sen', sans-serif;
            animation: livePulse 2s ease-in-out infinite;
        }
        /* BROWSE TILES */
        #browse-tiles-view {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-base); z-index: 9990;
            flex-direction: column; overflow: hidden;
        }
        #browse-tiles-view.open { display: flex; }
        #browse-tiles-header {
            display: flex; align-items: center; gap: var(--s3);
            padding: var(--s3) var(--s4);
            background: var(--glass-bg); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-default);
        }
        #browse-tiles-title {
            flex: 1; font-size: var(--text-base); font-weight: 700;
            color: var(--text-primary); white-space: nowrap; overflow: hidden;
            text-overflow: ellipsis;
        }
        #browse-tiles-key {
            font-size: var(--text-xs); color: var(--teal); font-weight: 600;
        }
        #browse-tiles-close {
            background: none; border: none; color: var(--text-secondary);
            font-size: var(--text-xl); cursor: pointer; padding: var(--s1);
            font-family: 'Sen', sans-serif;
        }
        #browse-tiles-grid {
            flex: 1; overflow-y: auto; padding: var(--s3);
            display: flex; flex-direction: column; gap: var(--s2);
            -webkit-overflow-scrolling: touch;
            padding-bottom: 70px;
        }
        .browse-tile {
            background: var(--bg-element); border: 1px solid var(--border-default);
            border-radius: var(--r-md); padding: var(--s3) var(--s4);
            cursor: pointer; transition: all 0.15s ease;
        }
        .browse-tile:active { transform: scale(0.98); }
        .browse-tile.active { border-color: var(--accent-primary); background: rgba(99,102,241,0.1); }
        .browse-tile-label {
            font-size: var(--text-xs); font-weight: 700; color: var(--accent-primary);
            text-transform: uppercase; margin-bottom: var(--s1); letter-spacing: 0.5px;
        }
        .browse-tile-preview {
            font-size: var(--text-sm); color: var(--text-secondary);
            line-height: 1.4; max-height: 3.6em; overflow: hidden;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
        }
        .browse-tile-note {
            margin-top: var(--s1); font-size: var(--text-xs); color: var(--yellow);
            font-style: italic;
        }
        .browse-tile-note::before { content: '📝 '; font-style: normal; }
        @keyframes livePulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0.4); }
            50% { box-shadow: 0 0 0 8px rgba(16,185,129,0); }
        }
        #browse-live-btn:hover { filter: brightness(1.1); }

        /* PROFILE SELECTOR */
        #profile-screen {
            position: fixed; inset: 0; z-index: 20000;
            background: var(--bg-app);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: var(--s6);
        }
        #profile-screen h2 { font-size: var(--text-2xl); margin-bottom: var(--s6); color: var(--text-primary); }
        #profile-list {
            display: flex; flex-wrap: wrap; gap: var(--s4); justify-content: center;
            max-width: 500px; margin-bottom: var(--s6);
        }
        .profile-card {
            display: flex; flex-direction: column; align-items: center; gap: var(--s2);
            padding: var(--s4) var(--s5); border-radius: var(--r-lg);
            background: var(--bg-elevated); border: 2px solid var(--border-default);
            cursor: pointer; transition: all 0.2s; min-width: 100px;
        }
        .profile-card:hover { border-color: var(--accent-primary); transform: translateY(-2px); }
        .profile-avatar {
            width: 48px; height: 48px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; font-weight: 700; color: #fff;
        }
        .profile-card-name { font-size: var(--text-sm); font-weight: 600; color: var(--text-primary); }
        .profile-card-instrument { font-size: var(--text-xs); color: var(--text-tertiary); }
        #create-profile-btn {
            padding: var(--s3) var(--s6); border-radius: var(--r-md);
            background: var(--accent-primary); color: #fff; border: none;
            cursor: pointer; font-size: var(--text-sm); font-weight: 600;
            font-family: 'Sen', sans-serif;
        }
        #create-profile-btn:hover { filter: brightness(1.1); }

        /* PROFILE BADGE */
        #profile-badge {
            position: absolute; top: var(--s3); left: 56px;
            display: flex; align-items: center; gap: var(--s2);
            background: var(--glass-bg); backdrop-filter: blur(8px);
            border: 1px solid var(--border-default); border-radius: var(--r-full);
            padding: 4px 12px 4px 4px; z-index: 9998;
            opacity: 0.6; transition: opacity 0.2s; cursor: pointer;
        }
        #profile-badge:hover { opacity: 1; }
        #profile-badge .mini-avatar {
            width: 24px; height: 24px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.6rem; font-weight: 700; color: #fff;
        }
        #profile-badge .profile-name { font-size: var(--text-xs); color: var(--text-primary); }

        /* PERSONAL NOTES (in meta panel) */
        #section-note-area {
            margin-top: var(--s1);
        }
        .section-note {
            background: rgba(99, 102, 241, 0.15); border-left: 3px solid var(--accent-primary);
            padding: 4px 10px; border-radius: 0 6px 6px 0;
            font-size: var(--text-xs); color: var(--accent-primary); font-style: italic;
            cursor: pointer; display: flex; align-items: center; gap: 6px;
            line-height: 1.3;
        }
        .section-note::before { content: '📝'; font-style: normal; }
        .add-note-btn {
            display: inline-block; font-size: var(--text-xs); opacity: 0.4;
            cursor: pointer; padding: 2px 6px; transition: opacity 0.2s;
            color: var(--text-secondary);
        }
        .add-note-btn:hover { opacity: 0.8; }

        /* NOTE EDITOR MODAL */
        #note-editor {
            display: none; position: fixed; inset: 0; z-index: 20001;
            background: rgba(0,0,0,0.7); align-items: center; justify-content: center;
        }
        #note-editor.open { display: flex; }
        #note-editor-content {
            background: var(--bg-elevated); border-radius: var(--r-lg);
            padding: var(--s5); width: 90%; max-width: 400px;
            border: 1px solid var(--border-default);
        }
        #note-editor-content h3 { margin: 0 0 var(--s3); font-size: var(--text-lg); color: var(--text-primary); }
        #note-input {
            width: 100%; padding: var(--s3); border-radius: var(--r-md);
            background: var(--bg-surface); color: var(--text-primary);
            border: 1px solid var(--border-default); font-family: 'Sen', sans-serif;
            font-size: var(--text-sm); resize: vertical; min-height: 60px;
            box-sizing: border-box;
        }
        #note-editor-btns {
            display: flex; gap: var(--s3); margin-top: var(--s3); justify-content: flex-end;
        }
        #note-editor-btns button {
            padding: var(--s2) var(--s4); border-radius: var(--r-md); border: none;
            cursor: pointer; font-size: var(--text-sm); font-family: 'Sen', sans-serif;
        }

        /* PER-SONG CAPO INDICATOR */
        .song-capo-badge {
            display: inline-block; font-size: var(--text-xs);
            background: rgba(16,185,129,0.2); color: var(--accent-success);
            padding: 2px 8px; border-radius: var(--r-full); margin-left: var(--s2);
        }

        /* --- WIDOK UWIELBIENIA --- */
        #worship-view {
            display: flex;
            flex-direction: column;
            height: 100%; width: 100%;
        }

        /* GÓRA (70%) */
        #current-slide {
            height: 70vh;
            width: 100%;
            padding: 0 20px; box-sizing: border-box;
            border-bottom: 1px solid var(--border-default);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 8vh;
            line-height: 2.2;
            overflow: hidden;
            position: relative;
        }

        #stage-logo {
            max-width: 60%;
            max-height: 80%;
            object-fit: contain;
            display: block;
        }

        #current-content {
            display: none;
            width: 100%;
        }

        /* DÓŁ (30%) */
        #next-slide-container {
            height: 30vh;
            width: 100%;
            background-color: var(--bg-app);
            padding: 10px 40px; box-sizing: border-box;
            border-top: 1px solid var(--border-default);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .meta-info-container {
            position: absolute;
            top: 15px;
            right: 20px;
            text-align: right;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 5px;
        }

        #realtime-clock {
            font-size: 3.5vh;
            color: var(--text-tertiary);
            font-family: monospace;
            font-weight: bold;
        }

        #key-display {
            font-size: 3.5vh;
            color: var(--teal);
            font-weight: bold;
            display: none;
        }

        #capo-display {
            font-size: 2.5vh;
            color: var(--green);
            font-weight: bold;
            display: none;
        }

        #bpm-display {
            font-size: 2.5vh;
            color: var(--amber);
            font-weight: bold;
            font-family: monospace;
            letter-spacing: 1px;
            display: none;
        }

        #next-label {
            font-size: var(--font-xs);
            color: var(--red);
            font-weight: 700;
            margin-bottom: var(--s1);
            flex-shrink: 0;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        #next-content {
            flex-grow: 1;
            color: var(--text-secondary);
            font-size: 4vh;
            line-height: 2.0;
            text-align: left;
            overflow: hidden;
            display: flex;
            align-items: flex-start;
            padding-top: 15px;
            padding-right: 180px;
        }

        .text-wrapper { width: 100%; }

        /* AKORDY */
        .chord-wrapper { display: inline-block; position: relative; overflow: visible; vertical-align: baseline; }
        .bass-slash { color: var(--red); opacity: 0.8; }
        .bass-note { color: var(--teal); font-weight: 800; font-size: 0.95em; }

        #current-slide .chord {
            position: absolute; bottom: 0.7em; left: 0; transform: none;
            color: var(--accent); font-weight: 700; font-size: 0.65em;
            background: transparent; padding: 0; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        #current-slide .chord.nashville { color: var(--amber); }
        #current-slide .chord.capo { color: var(--green); }

        #next-slide-container .chord-wrapper {
            display: inline-block !important;
            position: relative;
            overflow: visible;
            vertical-align: baseline;
        }
        #next-slide-container .chord {
            position: absolute !important;
            bottom: 0.6em;
            left: 0;
            color: var(--green);
            font-size: 0.6em;
            font-weight: bold;
            white-space: nowrap;
        }
        #next-slide-container .chord.nashville { color: var(--amber); opacity: 0.6; }
        #next-slide-container .chord.capo { color: var(--green); opacity: 0.6; }

        #current-slide .chord.hard-chord {
            color: var(--amber);
            text-decoration: underline;
            text-decoration-style: dotted;
            text-underline-offset: 3px;
        }

        .chord-only-line .chord,
        #next-slide-container .chord-only-line .chord,
        #current-slide .chord-only-line .chord {
            position: static !important;
            font-size: 0.85em !important;
            display: inline-block;
            margin-right: 0.5em;
            white-space: nowrap;
        }
        .chord-only-line .chord-wrapper {
            display: inline-block !important;
            position: static !important;
            width: auto !important;
            margin-right: 0.3em;
        }
        .chord-only-line {
            line-height: 1.6;
            display: block;
            margin: 2px 0;
        }

        /* --- WIDOK KONFERENCJI --- */
        #conference-view {
            display: none; height: 100%; width: 100%;
            background: var(--bg-app);
            flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        #conf-timer { font-size: 25vh; font-weight: bold; font-family: monospace; color: white; margin-bottom: 5vh; }
        #conf-message { font-size: 8vh; color: yellow; padding: 20px; max-width: 90%; }

        /* --- PANEL USTAWIEŃ --- */
        #settings-overlay {
            display: none;
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 10000;
        }
        #settings-panel {
            position: fixed; top: 0; right: -360px;
            width: 340px; height: 100%;
            background: var(--bg-panel);
            backdrop-filter: blur(24px);
            border-left: 1px solid var(--border-default);
            border-radius: var(--r-xl) 0 0 var(--r-xl);
            z-index: 10001;
            transition: right var(--duration-normal) var(--ease-out);
            overflow-y: auto;
            padding: var(--s5);
            display: flex; flex-direction: column; gap: var(--s4);
        }
        #settings-panel.open { right: 0; }
        #settings-panel h2 {
            font-size: var(--font-lg); color: var(--text-primary);
            padding-bottom: var(--s3); border-bottom: 1px solid var(--border-default);
            display: flex; justify-content: space-between; align-items: center;
            margin: 0;
        }
        .setting-group {
            background: var(--bg-surface);
            border: 1px solid var(--border-default);
            border-radius: var(--r-lg);
            padding: var(--s4);
        }
        .setting-group .group-title {
            font-size: var(--font-xs); color: var(--text-tertiary);
            text-transform: uppercase; letter-spacing: 0.06em;
            margin-bottom: var(--s3); font-weight: 600;
        }
        .setting-group label {
            display: flex; justify-content: space-between; align-items: center;
            font-size: var(--font-sm); color: var(--text-primary);
            margin-bottom: var(--s3);
        }
        .setting-group label:last-child { margin-bottom: 0; }

        .toggle {
            position: relative; width: 44px; height: 24px;
            background: var(--bg-elevated); border-radius: var(--r-full); cursor: pointer;
            transition: background var(--duration-normal) var(--ease-out); flex-shrink: 0;
        }
        .toggle.active { background: var(--accent); }
        .toggle::after {
            content: '';
            position: absolute; top: 2px; left: 2px;
            width: 20px; height: 20px;
            background: #fff; border-radius: 50%;
            transition: transform var(--duration-normal) var(--ease-out);
        }
        .toggle.active::after { transform: translateX(20px); }

        input[type="range"] { width: 100%; accent-color: var(--accent); }
        #settings-panel select {
            width: 100%; padding: var(--s2) var(--s3);
            background: var(--bg-surface); border: 1px solid var(--border-default);
            color: var(--text-primary); border-radius: var(--r-md); font-size: var(--font-sm);
        }
        .btn {
            padding: var(--s3) var(--s4); border: none; border-radius: var(--r-md);
            font-size: var(--font-sm); font-weight: 600; cursor: pointer;
            transition: all var(--duration-normal) var(--ease-out);
        }
        .btn:hover { filter: brightness(1.15); }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { filter: brightness(1.15); }
        .btn-danger { background: var(--red); color: #fff; border: none; }
        .btn-danger:hover { filter: brightness(1.15); }

        /* CHORD POPUP */
        #chord-popup {
            display: none;
            position: fixed;
            z-index: 20000;
            background: var(--bg-elevated);
            border: 1px solid var(--border-default);
            border-radius: var(--r-xl);
            padding: var(--s2);
            box-shadow: var(--shadow-lg);
            pointer-events: auto;
        }
        .popup-close {
            background: none; border: none; color: var(--text-tertiary);
            font-size: var(--font-lg); cursor: pointer;
            transition: color var(--duration-fast) ease;
        }
        .popup-close:hover { color: var(--text-primary); }
        #chord-popup .popup-close {
            position: absolute; top: var(--s1); right: var(--s2);
            font-size: var(--font-sm);
        }
        #chord-popup .no-diagram {
            padding: var(--s5) var(--s4);
            color: var(--text-tertiary); font-size: var(--font-xs); text-align: center;
        }

        .chord.clickable { cursor: pointer; }
        .chord.clickable:hover { text-decoration: underline; }

        /* --- MOBILE TIP BANNER --- */
        #mobile-tip {
            display: none;
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(135deg, rgba(99,102,241,0.95), rgba(79,70,229,0.95));
            color: #fff;
            padding: 14px 16px;
            z-index: 9999;
            backdrop-filter: blur(12px);
            font-size: 0.82rem;
            line-height: 1.4;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
        }
        #mobile-tip .tip-content {
            display: flex;
            align-items: center;
            gap: 12px;
            max-width: 500px;
            margin: 0 auto;
        }
        #mobile-tip .tip-icon {
            font-size: 1.8rem;
            flex-shrink: 0;
            animation: rotateHint 2.5s ease-in-out infinite;
        }
        @keyframes rotateHint {
            0%, 100% { transform: rotate(0deg); }
            30% { transform: rotate(90deg); }
            60% { transform: rotate(90deg); }
            80% { transform: rotate(0deg); }
        }
        #mobile-tip .tip-close {
            position: absolute;
            top: 6px; right: 10px;
            background: none; border: none;
            color: rgba(255,255,255,0.7);
            font-size: 1.2rem; cursor: pointer;
            padding: 4px;
        }
        #mobile-tip .tip-close:hover { color: #fff; }
        #mobile-tip b { display: block; margin-bottom: 2px; font-size: 0.88rem; }

        @media (max-width: 600px) {
            #settings-panel { width: 100%; right: -100%; }
        }

        /* --- RESPONSIVE: phones & small screens --- */
        @media (max-width: 480px) {
            #current-slide {
                height: 60vh;
                font-size: 5.5vh;
                line-height: 1.8;
                padding: 0 10px;
            }
            #next-slide-container {
                height: 40vh;
                padding: 8px 12px;
            }
            .meta-info-container {
                top: 6px;
                right: 8px;
                gap: 2px;
            }
            #realtime-clock { font-size: 2.2vh; }
            #key-display { font-size: 2.2vh; }
            #capo-display { font-size: 1.8vh; }
            #bpm-display { font-size: 1.8vh; }
            #next-content {
                font-size: 2.8vh;
                line-height: 1.7;
                padding-right: 70px;
                padding-top: 8px;
            }
            #next-slide-container .chord {
                font-size: 0.55em;
                bottom: 0.5em;
            }
            .chord-only-line .chord {
                font-size: 0.85em !important;
                margin-right: 0.4em;
            }
            .chord-only-line {
                line-height: 1.4 !important;
                margin-bottom: 2px;
            }
            #current-slide .chord {
                font-size: 0.55em;
                bottom: 0.6em;
            }
            #setlist-btn, #fs-btn, #settings-btn {
                width: 36px; height: 36px;
            }
        }

        @media (max-width: 380px) {
            #current-slide {
                height: 55vh;
                font-size: 4.5vh;
                line-height: 1.6;
            }
            #next-slide-container {
                height: 45vh;
                padding: 6px 10px;
            }
            #next-content {
                font-size: 2.4vh;
                line-height: 1.5;
                padding-right: 55px;
            }
            .meta-info-container {
                top: 4px;
                right: 6px;
            }
            #realtime-clock { font-size: 1.8vh; }
            #key-display { font-size: 1.8vh; }
            #capo-display { font-size: 1.5vh; }
            #bpm-display { font-size: 1.5vh; }
        }

        @media (max-height: 700px) {
            #current-slide {
                height: 58vh;
                font-size: 5vh;
                line-height: 1.7;
            }
            #next-slide-container {
                height: 42vh;
            }
            #next-content {
                font-size: 2.8vh;
                line-height: 1.6;
                padding-right: 80px;
                padding-top: 6px;
            }
            .meta-info-container {
                top: 6px; right: 10px; gap: 2px;
            }
            #realtime-clock { font-size: 2vh; }
            #key-display { font-size: 2vh; }
            #capo-display { font-size: 1.6vh; }
            #bpm-display { font-size: 1.6vh; }
        }

        @media (max-width: 480px) and (max-height: 700px) {
            #current-slide {
                height: 55vh;
                font-size: 4.5vh;
                line-height: 1.6;
            }
            #next-slide-container {
                height: 45vh;
                padding: 6px 10px;
            }
            #next-content {
                font-size: 2.4vh;
                line-height: 1.5;
                padding-right: 55px;
                padding-top: 5px;
            }
        }

        /* Light theme overrides */
        [data-theme="light"] #current-slide .chord {
            text-shadow: none;
        }
        [data-theme="light"] #conf-timer {
            color: var(--text-primary);
        }
        [data-theme="light"] #conf-message {
            color: var(--amber);
        }
    </style>
</head>
<body>

    <!-- MOBILE TIP BANNER -->
    <div id="mobile-tip">
        <button class="tip-close" onclick="dismissMobileTip()">&times;</button>
        <div class="tip-content">
            <span class="tip-icon">📱</span>
            <div>
                <b data-t="bm_tip_title">Dodaj na ekran startowy</b>
                <span data-t="bm_tip_desc">iPhone: udostepnij &gt; Na ekran poczatkowy. Obróć telefon poziomo dla najlepszego widoku.</span>
            </div>
        </div>
    </div>

    <!-- PROFILE SELECTION SCREEN -->
    <div id="profile-screen" style="display:none;">
        <h2 id="profile-screen-title" data-t="profile_who">Kto grasz?</h2>
        <div id="profile-list"></div>
        <button id="create-profile-btn" onclick="showCreateProfile()" data-t="profile_new">+ Nowy profil</button>
        <div id="create-profile-form" style="display:none; margin-top:20px; text-align:center;">
            <input id="new-profile-name" data-t-ph="profile_name_ph" placeholder="Imię" style="padding:8px 14px; border-radius:8px; background:var(--bg-surface); color:var(--text-primary); border:1px solid var(--border-default); font-size:var(--text-sm); width:180px; font-family:'Sen',sans-serif;">
            <select id="new-profile-instrument" style="padding:8px 10px; border-radius:8px; background:var(--bg-surface); color:var(--text-primary); border:1px solid var(--border-default); font-size:var(--text-sm); margin-left:8px; font-family:'Sen',sans-serif;">
                <option value="">Instrument</option>
                <option value="gitara" data-t="profile_guitar">Gitara</option>
                <option value="pianino" data-t="profile_keys">Klawisze</option>
                <option value="bas" data-t="profile_bass">Bas</option>
                <option value="ukulele">Ukulele</option>
                <option value="skrzypce">Skrzypce</option>
                <option value="perkusja" data-t="profile_drums">Perkusja</option>
                <option value="wokal" data-t="profile_vocal">Wokal</option>
                <option value="inne" data-t="profile_other">Inne</option>
            </select>
            <button onclick="createProfile()" style="margin-left:8px; padding:8px 18px; border-radius:8px; background:var(--accent-success); color:#fff; border:none; cursor:pointer; font-family:'Sen',sans-serif;">OK</button>
        </div>

    <!-- PROFILE BADGE -->
    <div id="profile-badge" style="display:none;" onclick="showProfileScreen()" data-t-title="profile_switch">
        <div class="mini-avatar" id="badge-avatar"></div>
        <span class="profile-name" id="badge-name"></span>
    </div>

    <!-- NOTE EDITOR -->
    <div id="note-editor">
        <div id="note-editor-content">
            <h3 id="note-editor-title" data-t="note_title">Notatka</h3>
            <textarea id="note-input" data-t-ph="note_ph" placeholder="np. intro: arpeggio, bridge: palm mute..."></textarea>
            <div id="note-editor-btns">
                <button onclick="deleteNote()" data-t="note_delete" style="background:var(--accent-danger);color:#fff;">Usuń</button>
                <button onclick="closeNoteEditor()" data-t="note_cancel" style="background:var(--bg-surface);color:var(--text-primary);">Anuluj</button>
                <button onclick="saveNote()" data-t="note_save" style="background:var(--accent-primary);color:#fff;">Zapisz</button>
            </div>
        </div>
    </div>

    <button id="setlist-btn" onclick="toggleSetlistDrawer()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></button>
    <button id="fs-btn" onclick="toggleFullscreen()">⛶</button>
    <button id="settings-btn" onclick="toggleSettings()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>

    <div id="worship-view">
        <div id="current-slide">
            <img id="stage-logo" src="{{ url_for('static', filename='logo.png') }}">
            <div id="current-content" class="text-wrapper"></div>
        </div>

        <div id="next-slide-container">
            <div class="meta-info-container">
                <div id="realtime-clock">00:00</div>
                <div id="key-display"></div>
                <div id="capo-display"></div>
                <div id="bpm-display"></div>
                <div id="section-note-area"></div>
            </div>

            <div id="next-label" data-t="bm_next_label">NASTĘPNIE:</div>
            <div id="next-content">
                <div id="next-text-inner" class="text-wrapper"></div>
            </div>
        </div>
