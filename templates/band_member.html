    <div id="conference-view">
        <div id="conf-timer">00:00</div>
        <div id="conf-message"></div>
    </div>

    <!-- CHORD POPUP -->
    <div id="chord-popup">
        <button class="popup-close" onclick="hideChordPopup()">✕</button>
        <div id="chord-popup-content"></div>
    </div>

    <!-- SETLIST DRAWER -->
    <div id="setlist-overlay" onclick="toggleSetlistDrawer()"></div>
    <div id="setlist-drawer">
        <div id="setlist-drawer-header">
            <h3 data-t="bm_setlist">Setlista</h3>
            <button id="setlist-drawer-close" onclick="toggleSetlistDrawer()">✕</button>
        </div>
        <div id="setlist-song-list"></div>
    </div>

    <!-- BROWSE TILES VIEW -->
    <div id="browse-tiles-view">
        <div id="browse-tiles-header">
            <button id="browse-tiles-close" onclick="closeBrowseTiles()">✕</button>
            <span id="browse-tiles-title"></span>
            <span id="browse-tiles-key"></span>
        </div>
        <div id="browse-tiles-grid"></div>
    </div>

    <!-- BROWSE NAV BAR -->
    <div id="browse-nav">
        <button class="browse-nav-btn" onclick="browsePrev()">◀</button>
        <button class="browse-nav-btn" onclick="showBrowseTiles()" title="Kafelki">☰</button>
        <span id="browse-section-info"></span>
        <button class="browse-nav-btn" onclick="browseNext()">▶</button>
        <button id="browse-live-btn" onclick="returnToLive()" data-t="bm_browse_live">● LIVE</button>
    </div>

    <!-- PANEL USTAWIEŃ -->
    <div id="settings-overlay" onclick="toggleSettings()"></div>
    <div id="settings-panel">
        <h2>
            <span data-t="bm_settings">Ustawienia</span>
            <button class="popup-close" onclick="toggleSettings()">✕</button>
        </h2>

        <div class="setting-group">
            <div class="group-title" data-t="bm_profile_section">Profil</div>
            <div id="profile-manage-area" style="display:flex; align-items:center; gap:var(--s3);">
                <div id="manage-avatar" class="profile-avatar" style="width:36px; height:36px; font-size:1rem; flex-shrink:0;"></div>
                <span id="manage-profile-name" style="flex:1; font-weight:600; color:var(--text-primary);"></span>
                <button class="btn btn-ghost" onclick="switchProfile()" data-t="bm_switch_profile" style="font-size:var(--text-xs);">Zmień</button>
                <button class="btn btn-danger" onclick="deleteProfile()" style="padding:var(--s1) var(--s2);"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
            </div>
        </div>

        <div class="setting-group">
            <div class="group-title" data-t="bm_chords_group">Akordy</div>
            <label>
                <span data-t="bm_show_chords">Pokaż akordy</span>
                <div class="toggle active" id="tog-chords" onclick="toggleOpt('show_chords')"></div>
            </label>
            <label>
                <span data-t="bm_notation">Notacja</span>
                <select id="chord-notation" onchange="setNotation(this.value)" style="margin-left:auto; padding:var(--s1) var(--s2); border-radius:var(--r-md); background:var(--bg-surface); color:var(--text-primary); border:1px solid var(--border-default);">
                    <option value="international" data-t="bm_intl">Międzynarodowa (Bb, B)</option>
                    <option value="polish" data-t="bm_polish">Polska (B, H)</option>
                    <option value="nashville" data-t="bm_nashville">Nashville (1-2-3)</option>
                </select>
            </label>
            <label>
                <span data-t="bm_lowercase_minor">Małe litery = mol</span>
                <div class="toggle" id="tog-lowercase-minor" onclick="toggleOpt('lowercase_minor')"></div>
            </label>
            <label>
                <span data-t="bm_beginner">Tryb początkującego</span>
                <div class="toggle" id="tog-beginner" onclick="toggleOpt('beginner_mode')"></div>
            </label>
            <label>
                <span data-t="bm_diagrams">Diagramy chwytów</span>
                <select id="diagram-instrument" onchange="setDiagramInstrument(this.value)" style="margin-left:auto; padding:var(--s1) var(--s2); border-radius:var(--r-md); background:var(--bg-surface); color:var(--text-primary); border:1px solid var(--border-default);">
                    <option value="off" data-t="bm_off">Wyłączone</option>
                    <option value="guitar" selected data-t="bm_guitar">Gitara</option>
                    <option value="piano" data-t="bm_piano">Piano</option>
                </select>
            </label>
        </div>

        <div class="setting-group">
            <div class="group-title" data-t="bm_capo_group">Kapodaster</div>
            <label>
                <span data-t="bm_capo_fret">Próg kapo</span>
                <select id="capo-select" onchange="setCapo(+this.value)">
                    <option value="0" data-t="bm_none">Brak</option>
                    {% for i in range(1, 13) %}
                    <option value="{{ i }}">{{ i }}</option>
                    {% endfor %}
                </select>
            </label>
            <div id="capo-suggestion" style="margin-top:var(--s3); padding:var(--s3); background:rgba(45,212,191,0.05); border:1px solid rgba(45,212,191,0.2); border-radius:var(--r-md); font-size:var(--font-xs); color:var(--text-tertiary); display:none;">
                <div style="color:var(--teal); font-weight:bold; margin-bottom:var(--s1);" id="capo-suggest-title"></div>
                <div id="capo-suggest-details"></div>
            </div>
        </div>

        <div class="setting-group">
            <div class="group-title" data-t="bm_font_size">Rozmiar czcionki</div>
            <label>
                <span id="font-size-val">8</span> vh
            </label>
            <input type="range" id="font-size-range" min="4" max="14" step="0.5" value="8" oninput="setFontSize(+this.value)">
        </div>
    </div>

    <script>
        var socket;
        try { socket = io(); } catch(e) { socket = { on: function(){}, emit: function(){} }; }
        const worshipView = document.getElementById('worship-view');
        const confView = document.getElementById('conference-view');
        const currentContent = document.getElementById('current-content');
        const stageLogo = document.getElementById('stage-logo');

        // ===== SETTINGS STATE =====
        let currentSettings = {
            show_chords: true,
            chord_notation: 'international',
            lowercase_minor: false,
            capo_fret: 0,
            beginner_mode: false,
            diagram_instrument: 'guitar',
            font_size: 8
        };
        let currentRawText = '';
        let currentRawNext = '';
        let currentBandHtml = '';
        let currentBandNext = '';
        let currentKey = 'C';
        let currentBpm = 0;
        let currentTranspose = 0;
        let activePresetId = null;

        // ===== MUSICIAN PROFILE =====
        let currentProfile = null;
        let songSettingsCache = {};
        let currentLiveSongId = null;
        let editingNoteSection = null;

        function getProfileId() { return localStorage.getItem('jafa_profile_id'); }

        function initProfile() {
            var pid = getProfileId();
            if (pid) {
                fetch('/api/profiles/' + pid).then(r => r.json()).then(function(p) {
                    if (p.error) { showProfileScreen(); return; }
                    currentProfile = p;
                    applyProfileSettings(p);
                    showProfileBadge(p);
                }).catch(function() { showProfileScreen(); });
            } else {
                showProfileScreen();
            }
        }

        function showProfileScreen() {
            fetch('/api/profiles').then(r => r.json()).then(function(profiles) {
                var list = document.getElementById('profile-list');
                var colors = ['#6366f1','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#06b6d4','#84cc16'];
                list.innerHTML = profiles.map(function(p) {
                    var initial = (p.name || '?')[0].toUpperCase();
                    return '<div class="profile-card" onclick="selectProfile(' + p.id + ')">' +
                        '<div class="profile-avatar" style="background:' + (p.color || colors[p.id % colors.length]) + '">' + initial + '</div>' +
                        '<div class="profile-card-name">' + p.name + '</div>' +
                        (p.instrument ? '<div class="profile-card-instrument">' + p.instrument + '</div>' : '') +
                        '</div>';
                }).join('');
                document.getElementById('profile-screen').style.display = 'flex';
                document.getElementById('create-profile-form').style.display = 'none';
            });
        }

        function showCreateProfile() {
            document.getElementById('create-profile-form').style.display = 'block';
            document.getElementById('new-profile-name').focus();
        }

        function createProfile() {
            var name = document.getElementById('new-profile-name').value.trim();
            if (!name) return;
            var instrument = document.getElementById('new-profile-instrument').value;
            var colors = ['#6366f1','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#06b6d4','#84cc16'];
            var color = colors[Math.floor(Math.random() * colors.length)];
            fetch('/api/profiles', {
                method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({name: name, instrument: instrument, color: color})
            }).then(r => r.json()).then(function(res) {
                selectProfile(res.id);
            });
        }

        function selectProfile(id) {
            localStorage.setItem('jafa_profile_id', id);
            fetch('/api/profiles/' + id).then(r => r.json()).then(function(p) {
                currentProfile = p;
                applyProfileSettings(p);
                showProfileBadge(p);
                document.getElementById('profile-screen').style.display = 'none';
            });
        }

        function applyProfileSettings(p) {
            currentSettings.show_chords = p.show_chords;
            currentSettings.chord_notation = p.chord_notation;
            currentSettings.lowercase_minor = p.lowercase_minor;
            currentSettings.capo_fret = 0;
            currentSettings.beginner_mode = p.beginner_mode;
            currentSettings.diagram_instrument = p.diagram_instrument;
            currentSettings.font_size = p.font_size;
            updateToggles();
            var songId = getCurrentSongId();
            if (songId) loadSongSettings(songId);
            rerender();
        }

        function showProfileBadge(p) {
            var badge = document.getElementById('profile-badge');
            var avatar = document.getElementById('badge-avatar');
            var nameEl = document.getElementById('badge-name');
            avatar.style.background = p.color || '#6366f1';
            avatar.textContent = (p.name || '?')[0].toUpperCase();
            nameEl.textContent = p.name;
            badge.style.display = 'flex';
            var mAvatar = document.getElementById('manage-avatar');
            var mName = document.getElementById('manage-profile-name');
            if (mAvatar) { mAvatar.style.background = p.color || '#6366f1'; mAvatar.textContent = (p.name || '?')[0].toUpperCase(); }
            if (mName) mName.textContent = p.name;
        }

        function switchProfile() {
            toggleSettings();
            showProfileScreen();
        }

        function deleteProfile() {
            if (!currentProfile) return;
            if (!confirm(t('bm_delete_profile'))) return;
            fetch('/api/profiles/' + currentProfile.id, { method: 'DELETE' })
            .then(function() {
                localStorage.removeItem('jafa_profile_id');
                currentProfile = null;
                document.getElementById('profile-badge').style.display = 'none';
                toggleSettings();
                showProfileScreen();
            });
        }

        function saveProfileSettings() {
            if (!currentProfile) return;
            var data = Object.assign({}, currentSettings);
            delete data.capo_fret;
            fetch('/api/profiles/' + currentProfile.id, {
                method: 'PUT', headers: {'Content-Type':'application/json'},
                body: JSON.stringify(data)
            });
        }

        // ===== PER-SONG CAPO =====
        function loadSongSettings(songId) {
            if (!currentProfile || !songId) return;
            if (songSettingsCache[songId]) {
                applySongSettings(songId, songSettingsCache[songId]);
                return;
            }
            fetch('/api/profiles/' + currentProfile.id + '/song/' + songId)
                .then(r => r.json()).then(function(data) {
                    songSettingsCache[songId] = data;
                    applySongSettings(songId, data);
                });
        }

        function applySongSettings(songId, data) {
            var capo = (data.capo_fret !== null && data.capo_fret !== undefined) ? data.capo_fret : 0;
            currentSettings.capo_fret = capo;
            document.getElementById('capo-select').value = capo;
            rerender();
        }

        function saveSongCapo(songId, capoFret) {
            if (!currentProfile || !songId) return;
            var existing = songSettingsCache[songId] || {capo_fret: null, notes: {}};
            existing.capo_fret = capoFret;
            songSettingsCache[songId] = existing;
            fetch('/api/profiles/' + currentProfile.id + '/song/' + songId, {
                method: 'PUT', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({capo_fret: capoFret})
            });
        }

        // ===== PERSONAL NOTES =====
        function getSongNotes(songId) {
            if (!songSettingsCache[songId]) return {};
            return songSettingsCache[songId].notes || {};
        }

        function openNoteEditor(sectionIdx) {
            editingNoteSection = sectionIdx;
            var songId = getCurrentSongId();
            var notes = getSongNotes(songId);
            document.getElementById('note-input').value = notes[sectionIdx] || '';
            document.getElementById('note-editor-title').textContent =
                t('note_title') + ' — ' + (sectionIdx + 1);
            document.getElementById('note-editor').classList.add('open');
            document.getElementById('note-input').focus();
        }

        function closeNoteEditor() {
            document.getElementById('note-editor').classList.remove('open');
            editingNoteSection = null;
        }

        function saveNote() {
            var songId = getCurrentSongId();
            if (!currentProfile || !songId || editingNoteSection === null) return;
            var text = document.getElementById('note-input').value.trim();
            var existing = songSettingsCache[songId] || {capo_fret: null, notes: {}};
            if (!existing.notes) existing.notes = {};
            if (text) {
                existing.notes[editingNoteSection] = text;
            } else {
                delete existing.notes[editingNoteSection];
            }
            songSettingsCache[songId] = existing;
            fetch('/api/profiles/' + currentProfile.id + '/song/' + songId, {
                method: 'PUT', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({notes: existing.notes})
            });
            closeNoteEditor();
            rerender();
        }

        function deleteNote() {
            document.getElementById('note-input').value = '';
            saveNote();
        }

        function getCurrentSongId() {
            if (browseMode && browseData) return browseData.id;
            if (cachedSetlist.length && liveCurrentIndex >= 0 && liveCurrentIndex < cachedSetlist.length) {
                return cachedSetlist[liveCurrentIndex].id;
            }
            return currentLiveSongId;
        }

        // ===== MUSIC THEORY =====
        const NOTES = ['C', 'C#', 'D', 'Eb', 'E', 'F', 'F#', 'G', 'Ab', 'A', 'Bb', 'B'];
        const NOTES_PL = ['C', 'Cis', 'D', 'Es', 'E', 'F', 'Fis', 'G', 'As', 'A', 'B', 'H'];

        const NOTE_MAP_INT = {};
        NOTES.forEach((n, i) => NOTE_MAP_INT[n] = i);
        Object.assign(NOTE_MAP_INT, {
            'Db': 1, 'D#': 3, 'E#': 5, 'Fb': 4, 'Gb': 6,
            'G#': 8, 'A#': 10, 'B#': 0, 'Cb': 11
        });
        const NOTE_MAP_PL = {};
        NOTES_PL.forEach((n, i) => NOTE_MAP_PL[n] = i);
        Object.assign(NOTE_MAP_PL, {
            'Cis': 1, 'Dis': 3, 'Es': 3, 'Fis': 6, 'Gis': 8, 'As': 8, 'Ais': 10, 'His': 0, 'H': 11, 'B': 10
        });

        const CHORD_RE = /^([AaEe][Ss](?![uU])|[A-Ha-h][#b]?(?:is|IS|Is)?)(.*)$/;

        function parseRoot(str) {
            const m = str.match(CHORD_RE);
            return m ? { root: m[1], suffix: m[2] } : null;
        }

        function rootToPitch(root) {
            let r = root.charAt(0).toUpperCase() + root.slice(1);
            if (NOTE_MAP_INT[r] !== undefined) return NOTE_MAP_INT[r];
            if (NOTE_MAP_PL[r] !== undefined) return NOTE_MAP_PL[r];
            return null;
        }

        function pitchToNote(p) {
            return NOTES[((p % 12) + 12) % 12];
        }

        function transposeChord(chord, semi) {
            if (chord.includes('/')) {
                const parts = chord.split('/');
                return transposeChord(parts[0], semi) + '/' + transposeChord(parts.slice(1).join('/'), semi);
            }
            const p = parseRoot(chord);
            if (!p) return chord;
            const pc = rootToPitch(p.root);
            if (pc === null) return chord;
            return NOTES[((pc + semi) % 12 + 12) % 12] + p.suffix;
        }

        function simplifyChord(chord) {
            if (chord.includes('/')) chord = chord.split('/')[0];
            const p = parseRoot(chord);
            if (!p) return chord;
            const isMinor = /^m(?!aj)/i.test(p.suffix);
            return p.root + (isMinor ? 'm' : '');
        }

        function toNashville(chord, keyRoot) {
            if (chord.includes('/')) {
                const parts = chord.split('/');
                return toNashville(parts[0], keyRoot) + '/' + toNashville(parts.slice(1).join('/'), keyRoot);
            }
            const p = parseRoot(chord);
            if (!p) return chord;
            const pc = rootToPitch(p.root);
            const kpc = rootToPitch(keyRoot);
            if (pc === null || kpc === null) return chord;
            const interval = ((pc - kpc) % 12 + 12) % 12;
            const NASH = {0:'1',1:'♭2',2:'2',3:'♭3',4:'3',5:'4',6:'♭5',7:'5',8:'♭6',9:'6',10:'♭7',11:'7'};
            let num = NASH[interval];
            let suffix = p.suffix;
            if (/^m(?!aj)/i.test(suffix)) { suffix = suffix.replace(/^m/i, ''); num += 'm'; }
            if (suffix) num += suffix;
            return num;
        }

        function isHardChord(chordDisplay) {
            if (!chordDisplay) return false;
            const base = chordDisplay.includes('/') ? chordDisplay.split('/')[0] : chordDisplay;
            const p = parseRoot(base);
            if (!p) return false;
            const simple = p.root + (/^m(?!aj)/i.test(p.suffix) ? 'm' : '');
            return !EASY_CHORDS.has(simple);
        }

        function convertNotation(chord) {
            if (chord.includes('/')) {
                const parts = chord.split('/');
                return convertNotation(parts[0]) + '/' + convertNotation(parts.slice(1).join('/'));
            }
            const p = parseRoot(chord);
            if (!p) return chord;
            const pc = rootToPitch(p.root);
            if (pc === null) return chord;
            const notation = currentSettings.chord_notation || 'international';
            const table = notation === 'polish' ? NOTES_PL : NOTES;
            let newRoot = table[((pc % 12) + 12) % 12];
            let suffix = p.suffix;
            const isMinor = /^m(?!aj)/i.test(suffix);
            if (currentSettings.lowercase_minor) {
                if (isMinor) {
                    newRoot = newRoot[0].toLowerCase() + newRoot.slice(1);
                    suffix = suffix.replace(/^m/i, '');
                }
            }
            return newRoot + suffix;
        }

        function processChord(chord) {
            let display = chord;
            let cls = 'chord';
            if (currentSettings.capo_fret > 0) {
                display = transposeChord(display, -currentSettings.capo_fret);
                cls += ' capo';
            }
            if (currentSettings.beginner_mode) display = simplifyChord(display);
            const notation = currentSettings.chord_notation || 'international';
            if (notation === 'nashville') {
                display = toNashville(display, currentKey.replace('m', ''));
                cls = 'chord nashville';
                if (currentSettings.lowercase_minor) {
                    display = applyLowercaseMinorNashville(display);
                }
            } else {
                display = convertNotation(display);
            }
            if (notation !== 'nashville' && currentSettings.beginner_mode && isHardChord(display)) cls += ' hard-chord';
            return { display, cls };
        }

        function applyLowercaseMinorNashville(nashStr) {
            if (nashStr.includes('/')) {
                const parts = nashStr.split('/');
                return applyLowercaseMinorNashville(parts[0]) + '/' + applyLowercaseMinorNashville(parts.slice(1).join('/'));
            }
            const m = nashStr.match(/^([♭#]*\d+)(m)(.*)$/);
            if (m) return m[1].toLowerCase() + m[3];
            return nashStr;
        }

        // ===== CAPO SUGGESTION =====
        const EASY_CHORDS = new Set(['C','G','D','A','E','Am','Em','Dm','F','Bm']);

        function extractChords(rawText) {
            if (!rawText) return [];
            const matches = rawText.match(/\[(.*?)\]/g);
            if (!matches) return [];
            const unique = new Set();
            for (const m of matches) {
                let ch = m.slice(1, -1);
                if (ch.includes('/')) ch = ch.split('/')[0];
                const p = parseRoot(ch);
                if (p) unique.add(ch);
            }
            return [...unique];
        }

        function chordSimplifiedRoot(chord) {
            const p = parseRoot(chord);
            if (!p) return chord;
            const pc = rootToPitch(p.root);
            if (pc === null) return chord;
            const note = pitchToNote(pc);
            const isMinor = /^m(?!aj)/i.test(p.suffix);
            return note + (isMinor ? 'm' : '');
        }

        function suggestCapo() {
            const box = document.getElementById('capo-suggestion');
            const rawChords = extractChords(currentRawText);
            if (rawChords.length === 0) { box.style.display = 'none'; return; }
            // Apply current transposition so capo suggestions match what's actually displayed
            const chords = currentTranspose !== 0
                ? rawChords.map(ch => transposeChord(ch, currentTranspose))
                : rawChords;

            let bestCapo = 0;
            let bestScore = -1;
            let bestChords = [];

            for (let capo = 0; capo <= 7; capo++) {
                const transposed = chords.map(ch => {
                    const simple = simplifyChord(transposeChord(ch, -capo));
                    return chordSimplifiedRoot(simple);
                });
                const uniqueT = [...new Set(transposed)];
                const easyCount = uniqueT.filter(c => EASY_CHORDS.has(c)).length;
                const score = easyCount / uniqueT.length;
                if (score > bestScore || (score === bestScore && capo < bestCapo)) {
                    bestScore = score;
                    bestCapo = capo;
                    bestChords = uniqueT;
                }
            }

            if (bestCapo === 0 && bestScore >= 1) {
                box.style.display = 'block';
                document.getElementById('capo-suggest-title').textContent = t('bm_capo_simple');
                document.getElementById('capo-suggest-details').textContent = bestChords.join(', ');
            } else if (bestCapo > 0) {
                box.style.display = 'block';
                document.getElementById('capo-suggest-title').textContent = t('bm_capo_suggest') + ' ' + bestCapo;
                document.getElementById('capo-suggest-details').innerHTML =
                    t('bm_capo_chords') + ' ' + bestCapo + ': <span style="color:var(--text-primary);">' + bestChords.join(', ') + '</span>';
            } else {
                box.style.display = 'none';
            }
        }

        // ===== RENDERING =====
        // Use server-generated HTML (same as stage view) and transform chords client-side
        function transformServerHtml(html) {
            if (!html) return '';

            const container = document.createElement('div');
            container.innerHTML = html;

            if (!currentSettings.show_chords) {
                container.querySelectorAll('.chord-wrapper').forEach(el => el.remove());
                return container.innerHTML;
            }
            const chordEls = container.querySelectorAll('.chord');
            chordEls.forEach(el => {
                const rawChord = el.textContent;
                const { display, cls } = processChord(rawChord);

                el.className = cls;
                const isNashville = currentSettings.chord_notation === 'nashville';
                if (currentSettings.diagram_instrument !== 'off' && !isNashville) {
                    el.classList.add('clickable');
                    el.setAttribute('data-chord', rawChord);
                    el.setAttribute('data-chord-display', display);
                    el.setAttribute('onclick', 'showChordPopup(event, this.dataset.chord, this.dataset.chordDisplay)');
                }

                if (display.includes('/') && !isNashville) {
                    const parts = display.split('/');
                    el.innerHTML = parts[0] + "<span class='bass-slash'>/</span><span class='bass-note'>" + parts.slice(1).join('/') + "</span>";
                } else {
                    el.textContent = display;
                }
            });
            var result = container.innerHTML;
            var parts = result.split(/<br\s*\/?>/gi);
            var out = [];
            for (var p = 0; p < parts.length; p++) {
                var tmp = document.createElement('span');
                tmp.innerHTML = parts[p];
                var textOnly = tmp.textContent.replace(/ /g, '').trim();
                var hasChords = tmp.querySelector('.chord-wrapper');
                var hasNonChordText = false;
                if (textOnly) {
                    var clone = tmp.cloneNode(true);
                    clone.querySelectorAll('.chord-wrapper').forEach(function(el) { el.remove(); });
                    hasNonChordText = clone.textContent.replace(/ /g, '').trim().length > 0;
                }
                if (hasChords && !hasNonChordText) {
                    out.push('<span class="chord-only-line">' + parts[p] + '</span>');
                } else {
                    out.push(parts[p]);
                }
            }
            return out.join('<br>');
        }

        function getNoteHtml() {
            var songId = getCurrentSongId();
            if (!songId || !currentProfile) return '';
            var notes = getSongNotes(songId);
            var sectionIdx = browseMode ? browseSectionIdx : (liveSectionIndex || 0);
            var note = notes[sectionIdx];
            if (note) {
                return '<div class="section-note" onclick="openNoteEditor(' + sectionIdx + ')">' + note + '</div>';
            }
            return '<div class="add-note-btn" onclick="openNoteEditor(' + sectionIdx + ')">' + t('note_add') + '</div>';
        }

        var liveSectionIndex = 0;

        function rerender() {
            if (currentContent.style.display === 'none') return;
            currentContent.innerHTML = transformServerHtml(currentBandHtml);
            currentContent.style.fontSize = currentSettings.font_size + 'vh';
            setTimeout(() => { fitText('current-slide', 'current-content', currentSettings.font_size, 3); fixChordOverlap(currentContent); }, 0);

            // Next section (max 4 lines like stage view)
            if (currentBandNext && currentBandNext.trim()) {
                let rawLines = currentBandNext.split('<br>');
                let trimmed = rawLines.length > 4
                    ? rawLines.slice(0, 4).join('<br>') + '<br><span style="opacity:0.6;font-size:0.8em;">(...)</span>'
                    : currentBandNext;
                document.getElementById('next-text-inner').innerHTML = transformServerHtml(trimmed);
                document.getElementById('next-label').style.display = 'block';
                setTimeout(() => { fitText('next-content', 'next-text-inner', 4.5, 2.5); fixChordOverlap(document.getElementById('next-text-inner')); }, 0);
            } else {
                document.getElementById('next-text-inner').innerHTML = '';
                document.getElementById('next-label').style.display = 'none';
            }

            // Meta info
            const keyBox = document.getElementById('key-display');
            const capoBox = document.getElementById('capo-display');
            if (currentKey && currentKey !== 'N/A' && currentKey.trim() !== '-') {
                const displayKey = convertNotation(currentKey);
                keyBox.innerText = t('bm_key_prefix') + ' ' + displayKey;
                keyBox.style.display = 'block';
                if (currentSettings.capo_fret > 0) {
                    const capoKey = convertNotation(transposeChord(currentKey, -currentSettings.capo_fret));
                    capoBox.innerText = 'Capo ' + currentSettings.capo_fret + ' → graj ' + capoKey;
                    capoBox.style.display = 'block';
                } else {
                    capoBox.style.display = 'none';
                }
            } else {
                keyBox.style.display = 'none';
                capoBox.style.display = 'none';
            }

            const bpmBox = document.getElementById('bpm-display');
            if (currentBpm && currentBpm > 0) {
                bpmBox.innerText = currentBpm + ' BPM';
                bpmBox.style.display = 'block';
            } else {
                bpmBox.style.display = 'none';
            }

            document.getElementById('section-note-area').innerHTML = getNoteHtml();

            suggestCapo();
        }

        function fixChordOverlap(container) {
            if (!container) return;
            var chords = container.querySelectorAll('.chord');
            for (var i = 0; i < chords.length; i++) {
                chords[i].style.left = '0';
            }
            for (var i = 0; i < chords.length - 1; i++) {
                var curr = chords[i].getBoundingClientRect();
                var next = chords[i + 1].getBoundingClientRect();
                if (Math.abs(curr.top - next.top) > curr.height) continue;
                var gap = 6;
                if (curr.right + gap > next.left) {
                    var overlap = curr.right + gap - next.left;
                    var curLeft = parseFloat(chords[i].style.left) || 0;
                    chords[i].style.left = (curLeft - overlap) + 'px';
                }
            }
        }

        // Auto-Scale (same as stage)
        function fitText(containerId, contentId, maxVh, minVh) {
            const container = document.getElementById(containerId);
            const content = document.getElementById(contentId);
            if (!container || !content) return;
            if (container.style.display === 'none' || content.style.display === 'none') return;
            let size = maxVh;
            content.style.fontSize = size + 'vh';
            while (content.scrollHeight > container.clientHeight && size > minVh) {
                size -= 0.2;
                content.style.fontSize = size + 'vh';
            }
        }

        // Clock
        function updateClock() {
            document.getElementById('realtime-clock').innerText =
                new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }
        setInterval(updateClock, 1000);
        updateClock();

        // ===== FULLSCREEN =====
        function toggleFullscreen() {
            var doc = window.document, docEl = doc.documentElement;
            var req = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
            var cancel = doc.exitFullscreen || doc.mozCancelFullScreen || doc.webkitExitFullscreen || doc.msExitFullscreen;
            if (!doc.fullscreenElement && !doc.mozFullScreenElement && !doc.webkitFullscreenElement && !doc.msFullscreenElement) {
                if (req) req.call(docEl).catch(() => {});
            } else {
                if (cancel) cancel.call(doc);
            }
        }

        // ===== BROWSE MODE =====
        let browseMode = false;
        let browseData = null;  // { id, title, key, bpm, sections: [{band_html, raw_text}] }
        let browseSectionIdx = 0;
        let cachedSetlist = [];
        let liveCurrentIndex = -1;
        let pendingLiveData = null;

        function toggleSetlistDrawer() {
            const drawer = document.getElementById('setlist-drawer');
            const overlay = document.getElementById('setlist-overlay');
            const opening = !drawer.classList.contains('open');
            drawer.classList.toggle('open');
            overlay.style.display = opening ? 'block' : 'none';
            if (opening) refreshSetlist();
        }

        function refreshSetlist() {
            fetch('/api/setlist').then(r => r.json()).then(function(data) {
                cachedSetlist = data.setlist || [];
                liveCurrentIndex = data.current_index;
                renderSetlistDrawer();
            }).catch(function() {});
        }

        function renderSetlistDrawer() {
            const list = document.getElementById('setlist-song-list');
            if (!cachedSetlist.length) {
                list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-tertiary);font-size:var(--text-sm);">' +
                    (currentLang === 'en' ? 'No songs in setlist yet' : 'Brak piosenek na setliście') + '</div>';
                return;
            }
            list.innerHTML = cachedSetlist.map(function(song, i) {
                var isLive = (i === liveCurrentIndex);
                var isActive = browseMode && browseData && browseData.id === song.id;
                var cls = 'setlist-song-item' + (isLive ? ' live-now' : '') + (isActive ? ' active' : '');
                return '<div class="' + cls + '" onclick="browseSong(' + song.id + ')">' +
                    '<span class="setlist-song-item-title">' + (song.title || 'Untitled') + '</span>' +
                    (song.key ? '<span class="setlist-song-item-key">' + song.key + '</span>' : '') +
                    '</div>';
            }).join('');
        }

        function browseSong(songId) {
            fetch('/api/song/' + songId + '/band').then(r => r.json()).then(function(data) {
                if (data.error) return;
                browseData = data;
                browseSectionIdx = -1;
                browseMode = true;
                if (currentProfile) loadSongSettings(songId);
                showBrowseTiles();
                toggleSetlistDrawer();
                renderSetlistDrawer();
            });
        }

        function showBrowseTiles() {
            if (!browseData) return;
            var tilesView = document.getElementById('browse-tiles-view');
            document.getElementById('browse-tiles-title').textContent = browseData.title;
            document.getElementById('browse-tiles-key').textContent = browseData.key ? (t('bm_key_prefix') + ' ' + browseData.key) : '';

            var songId = browseData.id;
            var notes = currentProfile ? getSongNotes(songId) : {};
            var grid = document.getElementById('browse-tiles-grid');
            grid.innerHTML = browseData.sections.map(function(sec, i) {
                var preview = sec.raw_text.replace(/\[.*?\]/g, '').substring(0, 80);
                var noteText = notes[i] ? '<div class="browse-tile-note">' + notes[i] + '</div>' : '';
                return '<div class="browse-tile' + (i === browseSectionIdx ? ' active' : '') +
                    '" onclick="selectBrowseTile(' + i + ')">' +
                    '<div class="browse-tile-label">' + sec.label + '</div>' +
                    '<div class="browse-tile-preview">' + preview + '</div>' +
                    noteText + '</div>';
            }).join('');

            tilesView.classList.add('open');
            document.getElementById('browse-nav').classList.add('visible');
        }

        function selectBrowseTile(idx) {
            browseSectionIdx = idx;
            document.getElementById('browse-tiles-view').classList.remove('open');
            renderBrowseSection();
        }

        function closeBrowseTiles() {
            document.getElementById('browse-tiles-view').classList.remove('open');
            if (browseSectionIdx < 0) {
                returnToLive();
            }
        }

        function renderBrowseSection() {
            if (!browseData || !browseData.sections.length) return;
            var section = browseData.sections[browseSectionIdx];
            var nextSection = browseData.sections[browseSectionIdx + 1] || null;

            currentRawText = section.raw_text;
            currentBandHtml = section.band_html;
            currentRawNext = nextSection ? nextSection.raw_text : '';
            currentBandNext = nextSection ? nextSection.band_html : '';
            currentKey = browseData.key || 'C';
            currentBpm = browseData.bpm || 0;

            worshipView.style.display = 'flex';
            confView.style.display = 'none';
            stageLogo.style.display = 'none';
            currentContent.style.display = 'block';
            rerender();

            var info = document.getElementById('browse-section-info');
            info.textContent = browseData.title + '  (' + (browseSectionIdx + 1) + '/' + browseData.sections.length + ')';
            document.getElementById('browse-nav').classList.add('visible');
        }

        function browsePrev() {
            if (!browseData) return;
            if (browseSectionIdx > 0) { browseSectionIdx--; renderBrowseSection(); }
        }
        function browseNext() {
            if (!browseData) return;
            if (browseSectionIdx < browseData.sections.length - 1) {
                browseSectionIdx++;
                renderBrowseSection();
            } else {
                showBrowseTiles();
            }
        }

        function returnToLive() {
            browseMode = false;
            browseData = null;
            browseSectionIdx = -1;
            document.getElementById('browse-nav').classList.remove('visible');
            document.getElementById('browse-tiles-view').classList.remove('open');
            if (pendingLiveData) {
                applyLiveUpdate(pendingLiveData);
                pendingLiveData = null;
            } else {
                socket.emit('request_current_slide');
                fetch('/api/current-slide').then(r => r.json()).then(function(data) {
                    if (data.mode && data.mode !== 'none') applyLiveUpdate(data);
                }).catch(function() {});
            }
        }

        function applyLiveUpdate(data) {
            if (data.mode === 'logo') {
                worshipView.style.display = 'flex';
                confView.style.display = 'none';
                currentContent.style.display = 'none';
                stageLogo.style.display = 'block';
                document.getElementById('next-text-inner').innerHTML = '';
                document.getElementById('next-label').style.display = 'none';
                currentRawText = ''; currentRawNext = '';
                currentBandHtml = ''; currentBandNext = '';
            } else if (data.mode === 'blackout') {
                worshipView.style.display = 'flex';
                confView.style.display = 'none';
                document.getElementById('next-text-inner').innerHTML = '';
                document.getElementById('next-label').style.display = 'none';
                currentRawNext = ''; currentBandNext = '';
            } else if (data.mode === 'conference') {
                worshipView.style.display = 'none';
                confView.style.display = 'flex';
                document.getElementById('conf-timer').innerText = data.timer;
                document.getElementById('conf-timer').style.color = data.timer_color;
                document.getElementById('conf-message').innerText = data.message;
            } else {
                worshipView.style.display = 'flex';
                confView.style.display = 'none';
                stageLogo.style.display = 'none';
                currentContent.style.display = 'block';
                if (data.raw_text !== undefined) currentRawText = data.raw_text;
                if (data.raw_next !== undefined) currentRawNext = data.raw_next;
                if (data.band !== undefined) currentBandHtml = data.band;
                if (data.band_next !== undefined) currentBandNext = data.band_next;
                if (data.current_key && data.current_key !== 'N/A') currentKey = data.current_key;
                if (data.current_bpm && data.current_bpm > 0) currentBpm = data.current_bpm;
                if (data.transpose !== undefined) currentTranspose = parseInt(data.transpose) || 0;
                rerender();
            }
        }

        // ===== SOCKET EVENTS =====
        socket.on('update_slide', function(data) {
            if (browseMode) {
                pendingLiveData = data;
                return;
            }
            applyLiveUpdate(data);
        });

        socket.on('sync_state_to_client', function(state) {
            if (state.setlist) cachedSetlist = state.setlist;
            if (state.current_index !== undefined) {
                var oldIdx = liveCurrentIndex;
                liveCurrentIndex = state.current_index;
                if (oldIdx !== liveCurrentIndex) {
                    liveSectionIndex = 0;
                    var songId = getCurrentSongId();
                    if (songId && !browseMode) loadSongSettings(songId);
                }
            }
            if (state.is_blackout && !browseMode) {
                document.getElementById('next-text-inner').innerHTML = '';
                document.getElementById('next-label').style.display = 'none';
            }
        });

        socket.on('refresh_logo', function() { location.reload(); });

        // ===== SETTINGS UI =====
        function toggleSettings() {
            const panel = document.getElementById('settings-panel');
            const overlay = document.getElementById('settings-overlay');
            const open = panel.classList.toggle('open');
            overlay.style.display = open ? 'block' : 'none';
        }

        function toggleOpt(key) {
            currentSettings[key] = !currentSettings[key];
            updateToggles();
            rerender();
            saveProfileSettings();
        }

        function setDiagramInstrument(val) {
            currentSettings.diagram_instrument = val;
            rerender();
            saveProfileSettings();
        }

        function setNotation(val) {
            currentSettings.chord_notation = val;
            document.getElementById('chord-notation').value = val;
            rerender();
            saveProfileSettings();
        }

        function updateToggles() {
            document.getElementById('tog-chords').classList.toggle('active', currentSettings.show_chords);
            document.getElementById('tog-lowercase-minor').classList.toggle('active', currentSettings.lowercase_minor);
            document.getElementById('tog-beginner').classList.toggle('active', currentSettings.beginner_mode);
            document.getElementById('chord-notation').value = currentSettings.chord_notation || 'international';
            document.getElementById('diagram-instrument').value = currentSettings.diagram_instrument || 'guitar';
        }

        // ===== CHORD POPUP =====
        function showChordPopup(event, chordName, displayName) {
            event.stopPropagation();
            const popup = document.getElementById('chord-popup');
            const content = document.getElementById('chord-popup-content');
            const label = displayName || chordName;

            const inst = currentSettings.diagram_instrument;
            let html = '';

            if (inst === 'guitar') {
                const guitarName = chordName.includes('/') ? chordName.split('/')[0] : chordName;
                const data = lookupChord(guitarName);
                html = data ? renderChordSVG(label, data) : `<div class="no-diagram"><strong>${label}</strong><br>${t('bm_no_diagram')}</div>`;
            } else {
                const notes = lookupPianoChord(chordName);
                html = notes ? renderPianoSVG(label, notes) : `<div class="no-diagram"><strong>${label}</strong><br>${t('bm_no_diagram')}</div>`;
            }

            content.innerHTML = html;
            popup.style.display = 'block';

            const rect = event.target.getBoundingClientRect();
            const popupW = inst === 'piano' ? 220 : 140;
            let x = rect.left + rect.width / 2 - popupW / 2;
            let y = rect.bottom + 8;

            if (x < 8) x = 8;
            if (x + popupW > window.innerWidth) x = window.innerWidth - popupW - 8;
            if (y + 180 > window.innerHeight) y = rect.top - 180;

            popup.style.left = x + 'px';
            popup.style.top = y + 'px';
        }

        function hideChordPopup() {
            document.getElementById('chord-popup').style.display = 'none';
        }

        document.addEventListener('click', function(e) {
            const popup = document.getElementById('chord-popup');
            if (popup.style.display === 'block' && !popup.contains(e.target) && !e.target.classList.contains('clickable')) {
                hideChordPopup();
            }
        });

        function setCapo(val) {
            currentSettings.capo_fret = val;
            rerender();
            var songId = getCurrentSongId();
            if (songId && currentProfile) saveSongCapo(songId, val);
        }

        function setFontSize(val) {
            currentSettings.font_size = val;
            document.getElementById('font-size-val').textContent = val;
            rerender();
            saveProfileSettings();
        }

        // Preset functions removed — profiles auto-save settings

        socket.on('apply_settings', function(data) {
            if (data.lang) initI18n(data.lang);
        });

        updateToggles();
        initI18n();
        initProfile();

        fetch('/api/current-slide').then(r => r.json()).then(function(data) {
            if (data.mode && data.mode !== 'none') applyLiveUpdate(data);
        }).catch(function() {});
        fetch('/api/setlist').then(r => r.json()).then(function(data) {
            cachedSetlist = data.setlist || [];
            liveCurrentIndex = data.current_index;
            var songId = getCurrentSongId();
            if (songId && currentProfile) loadSongSettings(songId);
        }).catch(function() {});

        // ── Mobile tip banner ──
        function dismissMobileTip() {
            document.getElementById('mobile-tip').style.display = 'none';
            localStorage.setItem('jafa_bm_mobile_tip_done', 'true');
        }
        (function() {
            var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
            var isStandalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;
            var dismissed = localStorage.getItem('jafa_bm_mobile_tip_done');
            if (isMobile && !isStandalone && !dismissed) {
                document.getElementById('mobile-tip').style.display = 'block';
            }
        })();

        // ── Band Member Onboarding Tour ──
        (function() {
            var isTourParam = new URLSearchParams(window.location.search).has('tour');
            var onboardingDone = localStorage.getItem('jafa_bm_onboarding_done');
            if (!isTourParam && onboardingDone) return;

            var BM_STEPS = [
                {
                    target: '#profile-screen',
                    get title() { return currentLang === 'en' ? 'Create your profile' : 'Stwórz swój profil'; },
                    get text() { return currentLang === 'en' ? 'First, create your musician profile. Your personal settings (chords, notation, capo, font size) will be saved automatically.' : 'Na poczatek stwórz swój profil muzyka. Twoje ustawienia (akordy, notacja, kapo, czcionka) beda zapisywane automatycznie.'; },
                    position: 'bottom',
                    showIf: function() { return !currentProfile; },
                    beforeShow: function() {
                        var ps = document.getElementById('profile-screen');
                        if (ps) ps.style.zIndex = '99992';
                    },
                    waitFor: function(cb) {
                        var check = setInterval(function() {
                            if (currentProfile) {
                                clearInterval(check);
                                var ps = document.getElementById('profile-screen');
                                if (ps) ps.style.zIndex = '';
                                cb();
                            }
                        }, 300);
                    }
                },
                {
                    target: '#current-slide',
                    get title() { return currentLang === 'en' ? 'Live view' : 'Widok na zywo'; },
                    get text() { return currentLang === 'en' ? 'This is your main screen. Here you see the lyrics and chords sent live by the worship leader. Everything updates in real time.' : 'To jest Twój glówny ekran. Tutaj widzisz tekst i akordy wysylane na zywo przez lidera. Wszystko aktualizuje sie w czasie rzeczywistym.'; },
                    position: 'bottom'
                },
                {
                    target: '#next-slide-container',
                    get title() { return currentLang === 'en' ? 'Info panel' : 'Panel informacji'; },
                    get text() { return currentLang === 'en' ? 'Key, BPM, capo and your notes for the current song are shown here, along with a preview of the next section.' : 'Tonacja, BPM, kapo i Twoje notatki do piosenki sa tutaj widoczne, razem z podgladem nastepnej sekcji.'; },
                    position: 'top'
                },
                {
                    target: '#setlist-btn',
                    get title() { return currentLang === 'en' ? 'Browse setlist' : 'Setlista'; },
                    get text() { return currentLang === 'en' ? 'Open the setlist to browse songs before they\'re played live. Set up your capo, check chords and prepare — then hit LIVE to follow the worship leader!' : 'Otworz setliste aby przegladac piosenki zanim zostana zagrane na zywo. Ustaw kapo, sprawdz akordy i przygotuj sie — potem kliknij LIVE aby podazac za liderem!'; },
                    position: 'bottom'
                },
                {
                    target: '#settings-btn',
                    get title() { return currentLang === 'en' ? 'Your settings' : 'Twoje ustawienia'; },
                    get text() { return currentLang === 'en' ? 'Open settings to personalize your view — chord display, notation, capo, font size and more. Everything saves to your profile automatically.' : 'Otworz ustawienia aby spersonalizowac widok — akordy, notacja, kapo, czcionka i wiecej. Wszystko zapisuje sie automatycznie na Twoim profilu.'; },
                    position: 'bottom'
                }
            ];

            var bmStep = 0, bmOverlay, bmSpot, bmTip, bmInteract = null;

            function bmCleanInteract() {
                if (bmInteract) { bmInteract.el.removeEventListener('click', bmInteract.fn); bmInteract.el.style.zIndex = ''; bmInteract = null; }
            }

            function bmEnd() {
                bmCleanInteract();
                if (bmSpot) bmSpot.style.display = 'none';
                localStorage.setItem('jafa_bm_onboarding_done', 'true');

                if (bmOverlay) bmOverlay.classList.remove('active');
                if (bmTip) bmTip.classList.remove('visible');
                setTimeout(function() {
                    [bmOverlay, bmSpot, bmTip].forEach(function(el) { if (el && el.parentNode) el.parentNode.removeChild(el); });
                    bmOverlay = bmSpot = bmTip = null;
                }, 400);
                var url = new URL(window.location);
                url.searchParams.delete('tour');
                history.replaceState(null, '', url.toString());
            }

            function bmShow(idx) {
                while (idx < BM_STEPS.length && BM_STEPS[idx].showIf && !BM_STEPS[idx].showIf()) {
                    idx++;
                }
                if (idx >= BM_STEPS.length) { bmEnd(); return; }
                bmStep = idx;
                bmCleanInteract();
                var s = BM_STEPS[idx];
                if (s.beforeShow) s.beforeShow();

                if (s.waitFor) {
                    bmSpot.style.display = 'none';
                    var el = document.querySelector(s.target);
                    if (el) {
                        var r = el.getBoundingClientRect();
                        bmSpot.style.cssText = 'display:block;top:' + (r.top - 8) + 'px;left:' + (r.left - 8) + 'px;width:' + (r.width + 16) + 'px;height:' + (r.height + 16) + 'px;';
                    }
                    var arrowMap = { bottom: 'top', top: 'bottom', left: 'right', right: 'left' };
                    var skipLabel = currentLang === 'en' ? 'Skip' : 'Pomin';
                    bmTip.innerHTML = '<div class="onboarding-tooltip-arrow arrow-' + (arrowMap[s.position] || 'top') + '"></div>' +
                        '<div class="onboarding-step-counter">1 / ' + BM_STEPS.length + '</div>' +
                        '<h3>' + s.title + '</h3><p>' + s.text + '</p>' +
                        '<div class="onboarding-btn-row">' +
                        '<button class="onboarding-btn-skip" data-a="skip">' + skipLabel + '</button></div>';
                    bmTip.querySelector('[data-a="skip"]').onclick = function(e) { e.stopPropagation(); bmEnd(); };
                    var tw = 320, G = 16;
                    if (el) {
                        var rr = el.getBoundingClientRect();
                        bmTip.style.top = (rr.bottom + G) + 'px';
                        bmTip.style.left = Math.max(10, rr.left + rr.width / 2 - tw / 2) + 'px';
                    } else {
                        bmTip.style.top = '30%'; bmTip.style.left = '50%'; bmTip.style.transform = 'translateX(-50%)';
                    }
                    bmTip.classList.add('visible');
                    s.waitFor(function() { bmShow(idx + 1); });
                    return;
                }

                setTimeout(function() {
                    var el = document.querySelector(s.target);
                    if (!el || el.offsetParent === null) { bmShow(idx + 1); return; }
                    el.scrollIntoView({ behavior: 'smooth', block: 'center' });

                    setTimeout(function() {
                        var r = el.getBoundingClientRect(), P = 8;
                        bmSpot.style.cssText = 'display:block;top:' + (r.top - P) + 'px;left:' + (r.left - P) + 'px;width:' + (r.width + P * 2) + 'px;height:' + (r.height + P * 2) + 'px;';

                        var isLast = (idx === BM_STEPS.length - 1);
                        var nextLabel = currentLang === 'en' ? (isLast ? 'Done!' : 'Next') : (isLast ? 'Gotowe!' : 'Dalej');
                        var skipLabel = currentLang === 'en' ? 'Skip' : 'Pomin';
                        var backLabel = currentLang === 'en' ? 'Back' : 'Wstecz';
                        var arrowMap = { bottom: 'top', top: 'bottom', left: 'right', right: 'left' };

                        bmTip.innerHTML = '<div class="onboarding-tooltip-arrow arrow-' + (arrowMap[s.position] || 'top') + '"></div>' +
                            '<div class="onboarding-step-counter">' + (idx + 1) + ' / ' + BM_STEPS.length + '</div>' +
                            '<h3>' + s.title + '</h3><p>' + s.text + '</p>' +
                            '<div class="onboarding-btn-row">' +
                            (idx > 0 ? '<button class="onboarding-btn-ghost" data-a="back">' + backLabel + '</button>' : '') +
                            '<button class="onboarding-btn-primary" data-a="next">' + nextLabel + '</button>' +
                            '<button class="onboarding-btn-skip" data-a="skip">' + skipLabel + '</button></div>';

                        bmTip.querySelector('[data-a="next"]').onclick = function(e) { e.stopPropagation(); if (s.afterInteract) s.afterInteract(); bmShow(idx + 1); };
                        var bb = bmTip.querySelector('[data-a="back"]');
                        if (bb) bb.onclick = function(e) { e.stopPropagation(); bmShow(idx - 1); };
                        bmTip.querySelector('[data-a="skip"]').onclick = function(e) { e.stopPropagation(); bmEnd(); };

                        bmTip.classList.remove('visible');
                        bmTip.style.visibility = 'hidden'; bmTip.style.display = 'block';
                        var tr = bmTip.getBoundingClientRect(), tw = tr.width, th = tr.height, G = 16;
                        var top, left;
                        switch (s.position) {
                            case 'bottom': top = r.bottom + G; left = r.left + r.width / 2 - tw / 2; break;
                            case 'top': top = r.top - th - G; left = r.left + r.width / 2 - tw / 2; break;
                            case 'left': top = r.top + r.height / 2 - th / 2; left = r.left - tw - G; break;
                            case 'right': top = r.top + r.height / 2 - th / 2; left = r.right + G; break;
                            default: top = r.bottom + G; left = r.left;
                        }
                        var vw = window.innerWidth, vh = window.innerHeight;
                        if (left < 10) left = 10; if (left + tw > vw - 10) left = vw - tw - 10;
                        if (top < 10) top = 10; if (top + th > vh - 10) top = vh - th - 10;
                        bmTip.style.top = top + 'px'; bmTip.style.left = left + 'px'; bmTip.style.transform = ''; bmTip.style.visibility = '';
                        requestAnimationFrame(function() { bmTip.classList.add('visible'); });

                        if (s.interactive) {
                            var iEl = document.querySelector(s.target);
                            if (iEl) {
                                iEl.style.zIndex = '100001';
                                var handler = function() { if (s.afterInteract) s.afterInteract(); setTimeout(function() { bmShow(idx + 1); }, 300); };
                                iEl.addEventListener('click', handler);
                                bmInteract = { el: iEl, fn: handler };
                            }
                        }
                    }, 300);
                }, 100);
            }

            var style = document.createElement('style');
            style.textContent = '.onboarding-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:99990;opacity:0;transition:opacity .3s;pointer-events:all}.onboarding-overlay.active{opacity:1}.onboarding-spotlight{position:fixed;z-index:99995;border-radius:12px;box-shadow:0 0 0 9999px rgba(0,0,0,0.65);pointer-events:none;transition:all .35s cubic-bezier(.4,0,.2,1);display:none}.onboarding-spotlight::after{content:"";position:absolute;inset:-4px;border-radius:14px;border:2px solid var(--accent-primary,#6366f1);animation:onboarding-pulse 2s ease-in-out infinite}@keyframes onboarding-pulse{0%,100%{opacity:.6}50%{opacity:1}}.onboarding-tooltip{position:fixed;z-index:100000;background:var(--bg-elevated,#1e293b);border:1px solid var(--border-default,#334155);border-radius:14px;padding:20px 24px;max-width:340px;min-width:260px;box-shadow:0 20px 60px rgba(0,0,0,.4);opacity:0;transform:translateY(8px);transition:all .25s}.onboarding-tooltip.visible{opacity:1;transform:translateY(0)}.onboarding-tooltip-arrow{position:absolute;width:12px;height:12px;background:var(--bg-elevated,#1e293b);border:1px solid var(--border-default,#334155);transform:rotate(45deg)}.arrow-top{top:-7px;left:50%;margin-left:-6px;border-right:none;border-bottom:none}.arrow-bottom{bottom:-7px;left:50%;margin-left:-6px;border-left:none;border-top:none}.arrow-left{left:-7px;top:50%;margin-top:-6px;border-top:none;border-right:none}.arrow-right{right:-7px;top:50%;margin-top:-6px;border-bottom:none;border-left:none}.onboarding-step-counter{font-size:.7rem;color:var(--text-tertiary,#64748b);margin-bottom:8px;letter-spacing:1px;font-weight:600}.onboarding-tooltip h3{margin:0 0 6px;font-size:1rem;color:var(--text-primary,#f1f5f9)}.onboarding-tooltip p{margin:0 0 16px;font-size:.85rem;line-height:1.5;color:var(--text-secondary,#94a3b8)}.onboarding-btn-row{display:flex;gap:8px;align-items:center}.onboarding-btn-primary{padding:8px 20px;background:var(--accent-primary,#6366f1);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:.8rem;font-weight:600}.onboarding-btn-primary:hover{filter:brightness(1.1)}.onboarding-btn-ghost{padding:8px 14px;background:transparent;color:var(--text-secondary,#94a3b8);border:1px solid var(--border-default,#334155);border-radius:8px;cursor:pointer;font-size:.8rem}.onboarding-btn-ghost:hover{background:rgba(255,255,255,.05)}.onboarding-btn-skip{padding:4px 10px;background:transparent;color:var(--text-tertiary,#64748b);border:none;cursor:pointer;font-size:.7rem;margin-left:auto}.onboarding-btn-skip:hover{color:var(--text-secondary,#94a3b8)}';
            document.head.appendChild(style);

            setTimeout(function() {
                bmOverlay = document.createElement('div'); bmOverlay.className = 'onboarding-overlay';
                bmOverlay.addEventListener('click', function(e) { if (e.target === bmOverlay) bmShow(bmStep + 1); });
                document.body.appendChild(bmOverlay);
                bmSpot = document.createElement('div'); bmSpot.className = 'onboarding-spotlight'; document.body.appendChild(bmSpot);
                bmTip = document.createElement('div'); bmTip.className = 'onboarding-tooltip'; document.body.appendChild(bmTip);
                requestAnimationFrame(function() { bmOverlay.classList.add('active'); });
                setTimeout(function() { bmShow(0); }, 200);
            }, 800);
        })();
    </script>
</body>
</html>
