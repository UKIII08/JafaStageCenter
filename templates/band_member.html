<!DOCTYPE html>
<html>
<head>
    <title>Widok Członka Zespołu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        @font-face {
            font-family: 'Sen';
            src: url("{{ url_for('static', filename='fonts/Sen-Regular.ttf') }}") format('truetype');
            font-weight: 400;
        }
        @font-face {
            font-family: 'Sen';
            src: url("{{ url_for('static', filename='fonts/Sen-Bold.ttf') }}") format('truetype');
            font-weight: 700;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="{{ url_for('static', filename='js/chord_diagrams.js') }}"></script>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Sen', sans-serif;
            margin: 0; padding: 0;
            height: 100vh; width: 100vw;
            overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* PRZYCISKI GÓRNE */
        #fs-btn, #settings-btn {
            position: absolute;
            top: 10px;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            font-size: 2vh;
            padding: 8px 12px;
            cursor: pointer;
            z-index: 9999;
            border-radius: 5px;
            opacity: 0.5;
            transition: opacity 0.3s;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        #fs-btn { right: 10px; }
        #settings-btn { right: 60px; }
        #fs-btn:hover, #fs-btn:active, #settings-btn:hover, #settings-btn:active { opacity: 1; background: rgba(255,255,255,0.3); }

        /* --- WIDOK UWIELBIENIA --- */
        #worship-view {
            display: flex;
            flex-direction: column;
            height: 100%; width: 100%;
        }

        /* GÓRA (70%) */
        #current-slide {
            height: 70vh;
            width: 100%;
            padding: 0 20px; box-sizing: border-box;
            border-bottom: 2px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 8vh;
            line-height: 2.2;
            overflow: hidden;
            position: relative;
        }

        #stage-logo {
            max-width: 60%;
            max-height: 80%;
            object-fit: contain;
            display: block;
        }

        #current-content {
            display: none;
            width: 100%;
        }

        /* DÓŁ (30%) */
        #next-slide-container {
            height: 30vh;
            width: 100%;
            background-color: #111;
            padding: 10px 40px; box-sizing: border-box;
            border-top: 1px solid #444;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .meta-info-container {
            position: absolute;
            top: 15px;
            right: 20px;
            text-align: right;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 5px;
        }

        #realtime-clock {
            font-size: 3.5vh;
            color: #888;
            font-family: monospace;
            font-weight: bold;
        }

        #key-display {
            font-size: 3.5vh;
            color: #00e5ff;
            font-weight: bold;
            display: none;
        }

        #capo-display {
            font-size: 2.5vh;
            color: #69f0ae;
            font-weight: bold;
            display: none;
        }

        #bpm-display {
            font-size: 2.5vh;
            color: #fb6340;
            font-weight: bold;
            font-family: monospace;
            letter-spacing: 1px;
            display: none;
        }

        #next-label {
            font-size: 2vh;
            color: #f5365c;
            font-weight: bold;
            margin-bottom: 5px;
            flex-shrink: 0;
        }

        #next-content {
            flex-grow: 1;
            color: #999;
            font-size: 4vh;
            line-height: 2.0;
            text-align: left;
            overflow: hidden;
            display: flex;
            align-items: flex-start;
            padding-top: 15px;
            padding-right: 180px;
        }

        .text-wrapper { width: 100%; }

        /* AKORDY */
        .chord-wrapper { display: inline-block; position: relative; overflow: visible; vertical-align: baseline; }
        .bass-slash { color: #ff6b6b; opacity: 0.8; }
        .bass-note { color: #ff4d4d; font-weight: 800; font-size: 0.95em; }

        #current-slide .chord {
            position: absolute; bottom: 0.7em; left: 0; transform: none;
            color: #00e5ff; font-weight: 700; font-size: 0.65em;
            background: transparent; padding: 0; text-shadow: 1px 1px 2px #000;
        }
        #current-slide .chord.nashville { color: #ffd600; }
        #current-slide .chord.capo { color: #69f0ae; }

        #next-slide-container .chord-wrapper {
            display: inline-block !important;
            position: relative;
            overflow: visible;
            vertical-align: baseline;
        }
        #next-slide-container .chord {
            position: absolute !important;
            bottom: 0.6em;
            left: 0;
            color: #4db6ac;
            font-size: 0.6em;
            font-weight: bold;
            white-space: nowrap;
        }
        #next-slide-container .chord.nashville { color: #ffd60099; }
        #next-slide-container .chord.capo { color: #69f0ae99; }

        #current-slide .chord.hard-chord {
            color: #ff9800;
            text-decoration: underline;
            text-decoration-style: dotted;
            text-underline-offset: 3px;
        }

        .chord-only-line .chord {
            position: static !important;
            font-size: 1em !important;
            display: inline-block;
            margin-right: 0.5em;
        }

        /* --- WIDOK KONFERENCJI --- */
        #conference-view {
            display: none; height: 100%; width: 100%;
            background: black;
            flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        #conf-timer { font-size: 25vh; font-weight: bold; font-family: monospace; color: white; margin-bottom: 5vh; }
        #conf-message { font-size: 8vh; color: yellow; padding: 20px; max-width: 90%; }

        /* --- PANEL USTAWIEŃ --- */
        #settings-overlay {
            display: none;
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 10000;
        }
        #settings-panel {
            position: fixed; top: 0; right: -360px;
            width: 340px; height: 100%;
            background: #1a1a28;
            border-left: 1px solid #333;
            z-index: 10001;
            transition: right 0.3s ease;
            overflow-y: auto;
            padding: 20px;
            display: flex; flex-direction: column; gap: 16px;
        }
        #settings-panel.open { right: 0; }
        #settings-panel h2 {
            font-size: 18px; color: #fff;
            padding-bottom: 10px; border-bottom: 1px solid #333;
            display: flex; justify-content: space-between; align-items: center;
        }
        .setting-group {
            background: #22223a;
            border-radius: 10px;
            padding: 14px;
        }
        .setting-group .group-title {
            font-size: 12px; color: #888;
            text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .setting-group label {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 14px; color: #ccc;
            margin-bottom: 10px;
        }
        .setting-group label:last-child { margin-bottom: 0; }

        .toggle {
            position: relative; width: 44px; height: 24px;
            background: #444; border-radius: 12px; cursor: pointer;
            transition: background 0.3s; flex-shrink: 0;
        }
        .toggle.active { background: #00e5ff; }
        .toggle::after {
            content: '';
            position: absolute; top: 2px; left: 2px;
            width: 20px; height: 20px;
            background: #fff; border-radius: 50%;
            transition: transform 0.3s;
        }
        .toggle.active::after { transform: translateX(20px); }

        input[type="range"] { width: 100%; accent-color: #00e5ff; }
        #settings-panel select {
            width: 100%; padding: 8px 10px;
            background: #2a2a44; border: 1px solid #444;
            color: #fff; border-radius: 6px; font-size: 14px;
        }
        .btn {
            padding: 10px 16px; border: none; border-radius: 8px;
            font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .btn-primary { background: #00e5ff; color: #000; }
        .btn-primary:hover { background: #00b8d4; }
        .btn-danger { background: #f5365c22; color: #f5365c; border: 1px solid #f5365c44; }
        .btn-danger:hover { background: #f5365c44; }

        /* CHORD POPUP */
        #chord-popup {
            display: none;
            position: fixed;
            z-index: 20000;
            background: #1a1a2e;
            border: 1px solid #00e5ff44;
            border-radius: 12px;
            padding: 8px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.8);
            pointer-events: auto;
        }
        #chord-popup .popup-close {
            position: absolute; top: 4px; right: 8px;
            background: none; border: none; color: #666;
            font-size: 14px; cursor: pointer;
        }
        #chord-popup .popup-close:hover { color: #fff; }
        #chord-popup .no-diagram {
            padding: 20px 16px;
            color: #888; font-size: 13px; text-align: center;
        }

        .chord.clickable { cursor: pointer; }
        .chord.clickable:hover { text-decoration: underline; }

        @media (max-width: 600px) {
            #settings-panel { width: 100%; right: -100%; }
        }
    </style>
</head>
<body>

    <button id="fs-btn" onclick="toggleFullscreen()">⛶</button>
    <button id="settings-btn" onclick="toggleSettings()">⚙</button>

    <div id="worship-view">
        <div id="current-slide">
            <img id="stage-logo" src="{{ url_for('static', filename='logo.png') }}">
            <div id="current-content" class="text-wrapper"></div>
        </div>

        <div id="next-slide-container">
            <div class="meta-info-container">
                <div id="realtime-clock">00:00</div>
                <div id="key-display"></div>
                <div id="capo-display"></div>
                <div id="bpm-display"></div>
            </div>

            <div id="next-label">NASTĘPNIE:</div>
            <div id="next-content">
                <div id="next-text-inner" class="text-wrapper"></div>
            </div>
        </div>
    </div>

    <div id="conference-view">
        <div id="conf-timer">00:00</div>
        <div id="conf-message"></div>
    </div>

    <!-- CHORD POPUP -->
    <div id="chord-popup">
        <button class="popup-close" onclick="hideChordPopup()">✕</button>
        <div id="chord-popup-content"></div>
    </div>

    <!-- PANEL USTAWIEŃ -->
    <div id="settings-overlay" onclick="toggleSettings()"></div>
    <div id="settings-panel">
        <h2>
            Ustawienia
            <button style="background:none; border:none; color:#888; font-size:18px; cursor:pointer;" onclick="toggleSettings()">✕</button>
        </h2>

        <div class="setting-group">
            <div class="group-title">Preset</div>
            <select id="preset-select" onchange="loadPreset(this.value)">
                <option value="">— Wybierz preset —</option>
                {% for p in presets %}
                <option value="{{ p.id }}" data-cfg='{{ {"show_chords": p.show_chords, "chord_notation": p.chord_notation or "international", "lowercase_minor": p.lowercase_minor or false, "capo_fret": p.capo_fret, "beginner_mode": p.beginner_mode, "diagram_instrument": p.diagram_instrument, "font_size": p.font_size}|tojson }}'>{{ p.name }}</option>
                {% endfor %}
            </select>
            <div style="display:flex; gap:8px; margin-top:10px;">
                <button class="btn btn-primary" style="flex:1;" onclick="savePresetDialog()">💾 Zapisz</button>
                <button class="btn btn-danger" onclick="deleteCurrentPreset()">🗑</button>
            </div>
        </div>

        <div class="setting-group">
            <div class="group-title">Akordy</div>
            <label>
                Pokaż akordy
                <div class="toggle active" id="tog-chords" onclick="toggleOpt('show_chords')"></div>
            </label>
            <label>
                Notacja
                <select id="chord-notation" onchange="setNotation(this.value)" style="margin-left:auto; padding:4px 8px; border-radius:6px; background:#222; color:#fff; border:1px solid #555;">
                    <option value="international">Międzynarodowa (Bb, B)</option>
                    <option value="polish">Polska (B, H)</option>
                    <option value="nashville">Nashville (1-2-3)</option>
                </select>
            </label>
            <label>
                Małe litery = mol
                <div class="toggle" id="tog-lowercase-minor" onclick="toggleOpt('lowercase_minor')"></div>
            </label>
            <label>
                Tryb początkującego
                <div class="toggle" id="tog-beginner" onclick="toggleOpt('beginner_mode')"></div>
            </label>
            <label>
                Diagramy chwytów
                <select id="diagram-instrument" onchange="setDiagramInstrument(this.value)" style="margin-left:auto; padding:4px 8px; border-radius:6px; background:#222; color:#fff; border:1px solid #555;">
                    <option value="off">Wyłączone</option>
                    <option value="guitar" selected>Gitara</option>
                    <option value="piano">Piano</option>
                </select>
            </label>
        </div>

        <div class="setting-group">
            <div class="group-title">Kapodaster</div>
            <label>
                Próg kapo
                <select id="capo-select" onchange="setCapo(+this.value)">
                    <option value="0">Brak</option>
                    {% for i in range(1, 13) %}
                    <option value="{{ i }}">{{ i }}</option>
                    {% endfor %}
                </select>
            </label>
            <div id="capo-suggestion" style="margin-top:10px; padding:10px; background:#1a1a2e; border-radius:8px; font-size:12px; color:#888; display:none;">
                <div style="color:#69f0ae; font-weight:bold; margin-bottom:4px;" id="capo-suggest-title"></div>
                <div id="capo-suggest-details"></div>
            </div>
        </div>

        <div class="setting-group">
            <div class="group-title">Rozmiar czcionki</div>
            <label>
                <span id="font-size-val">8</span> vh
            </label>
            <input type="range" id="font-size-range" min="4" max="14" step="0.5" value="8" oninput="setFontSize(+this.value)">
        </div>
    </div>

    <script>
        var socket = io();
        const worshipView = document.getElementById('worship-view');
        const confView = document.getElementById('conference-view');
        const currentContent = document.getElementById('current-content');
        const stageLogo = document.getElementById('stage-logo');

        // ===== SETTINGS STATE =====
        let currentSettings = {
            show_chords: true,
            chord_notation: 'international',
            lowercase_minor: false,
            capo_fret: 0,
            beginner_mode: false,
            diagram_instrument: 'guitar',
            font_size: 8
        };
        let currentRawText = '';
        let currentRawNext = '';
        let currentBandHtml = '';
        let currentBandNext = '';
        let currentKey = 'C';
        let currentBpm = 0;
        let activePresetId = null;

        // ===== MUSIC THEORY =====
        const NOTES = ['C', 'C#', 'D', 'Eb', 'E', 'F', 'F#', 'G', 'Ab', 'A', 'Bb', 'B'];
        const NOTES_PL = ['C', 'Cis', 'D', 'Es', 'E', 'F', 'Fis', 'G', 'As', 'A', 'B', 'H'];

        const NOTE_MAP_INT = {};
        NOTES.forEach((n, i) => NOTE_MAP_INT[n] = i);
        Object.assign(NOTE_MAP_INT, {
            'Db': 1, 'D#': 3, 'E#': 5, 'Fb': 4, 'Gb': 6,
            'G#': 8, 'A#': 10, 'B#': 0, 'Cb': 11
        });
        const NOTE_MAP_PL = {};
        NOTES_PL.forEach((n, i) => NOTE_MAP_PL[n] = i);
        Object.assign(NOTE_MAP_PL, {
            'Cis': 1, 'Dis': 3, 'Es': 3, 'Fis': 6, 'Gis': 8, 'As': 8, 'Ais': 10, 'His': 0, 'H': 11, 'B': 10
        });

        const CHORD_RE = /^([AaEe][Ss](?![uU])|[A-Ha-h][#b]?(?:is|IS|Is)?)(.*)$/;

        function parseRoot(str) {
            const m = str.match(CHORD_RE);
            return m ? { root: m[1], suffix: m[2] } : null;
        }

        function rootToPitch(root) {
            let r = root.charAt(0).toUpperCase() + root.slice(1);
            if (NOTE_MAP_INT[r] !== undefined) return NOTE_MAP_INT[r];
            if (NOTE_MAP_PL[r] !== undefined) return NOTE_MAP_PL[r];
            return null;
        }

        function pitchToNote(p) {
            return NOTES[((p % 12) + 12) % 12];
        }

        function transposeChord(chord, semi) {
            if (chord.includes('/')) {
                const parts = chord.split('/');
                return transposeChord(parts[0], semi) + '/' + transposeChord(parts.slice(1).join('/'), semi);
            }
            const p = parseRoot(chord);
            if (!p) return chord;
            const pc = rootToPitch(p.root);
            if (pc === null) return chord;
            return NOTES[((pc + semi) % 12 + 12) % 12] + p.suffix;
        }

        function simplifyChord(chord) {
            if (chord.includes('/')) chord = chord.split('/')[0];
            const p = parseRoot(chord);
            if (!p) return chord;
            const isMinor = /^m(?!aj)/i.test(p.suffix);
            return p.root + (isMinor ? 'm' : '');
        }

        function toNashville(chord, keyRoot) {
            if (chord.includes('/')) {
                const parts = chord.split('/');
                return toNashville(parts[0], keyRoot) + '/' + toNashville(parts.slice(1).join('/'), keyRoot);
            }
            const p = parseRoot(chord);
            if (!p) return chord;
            const pc = rootToPitch(p.root);
            const kpc = rootToPitch(keyRoot);
            if (pc === null || kpc === null) return chord;
            const interval = ((pc - kpc) % 12 + 12) % 12;
            const NASH = {0:'1',1:'♭2',2:'2',3:'♭3',4:'3',5:'4',6:'♭5',7:'5',8:'♭6',9:'6',10:'♭7',11:'7'};
            let num = NASH[interval];
            let suffix = p.suffix;
            if (/^m(?!aj)/i.test(suffix)) { suffix = suffix.replace(/^m/i, ''); num += 'm'; }
            if (suffix) num += suffix;
            return num;
        }

        function isHardChord(chordDisplay) {
            if (!chordDisplay) return false;
            const base = chordDisplay.includes('/') ? chordDisplay.split('/')[0] : chordDisplay;
            const p = parseRoot(base);
            if (!p) return false;
            const simple = p.root + (/^m(?!aj)/i.test(p.suffix) ? 'm' : '');
            return !EASY_CHORDS.has(simple);
        }

        function convertNotation(chord) {
            if (chord.includes('/')) {
                const parts = chord.split('/');
                return convertNotation(parts[0]) + '/' + convertNotation(parts.slice(1).join('/'));
            }
            const p = parseRoot(chord);
            if (!p) return chord;
            const pc = rootToPitch(p.root);
            if (pc === null) return chord;
            const notation = currentSettings.chord_notation || 'international';
            const table = notation === 'polish' ? NOTES_PL : NOTES;
            let newRoot = table[((pc % 12) + 12) % 12];
            let suffix = p.suffix;
            const isMinor = /^m(?!aj)/i.test(suffix);
            if (currentSettings.lowercase_minor) {
                if (isMinor) {
                    newRoot = newRoot[0].toLowerCase() + newRoot.slice(1);
                    suffix = suffix.replace(/^m/i, '');
                }
            }
            return newRoot + suffix;
        }

        function processChord(chord) {
            let display = chord;
            let cls = 'chord';
            if (currentSettings.capo_fret > 0) {
                display = transposeChord(display, -currentSettings.capo_fret);
                cls += ' capo';
            }
            if (currentSettings.beginner_mode) display = simplifyChord(display);
            const notation = currentSettings.chord_notation || 'international';
            if (notation === 'nashville') {
                display = toNashville(display, currentKey.replace('m', ''));
                cls = 'chord nashville';
                if (currentSettings.lowercase_minor) {
                    display = applyLowercaseMinorNashville(display);
                }
            } else {
                display = convertNotation(display);
            }
            if (notation !== 'nashville' && currentSettings.beginner_mode && isHardChord(display)) cls += ' hard-chord';
            return { display, cls };
        }

        function applyLowercaseMinorNashville(nashStr) {
            if (nashStr.includes('/')) {
                const parts = nashStr.split('/');
                return applyLowercaseMinorNashville(parts[0]) + '/' + applyLowercaseMinorNashville(parts.slice(1).join('/'));
            }
            const m = nashStr.match(/^([♭#]*\d+)(m)(.*)$/);
            if (m) return m[1].toLowerCase() + m[3];
            return nashStr;
        }

        // ===== CAPO SUGGESTION =====
        const EASY_CHORDS = new Set(['C','G','D','A','E','Am','Em','Dm','F','Bm']);

        function extractChords(rawText) {
            if (!rawText) return [];
            const matches = rawText.match(/\[(.*?)\]/g);
            if (!matches) return [];
            const unique = new Set();
            for (const m of matches) {
                let ch = m.slice(1, -1);
                if (ch.includes('/')) ch = ch.split('/')[0];
                const p = parseRoot(ch);
                if (p) unique.add(ch);
            }
            return [...unique];
        }

        function chordSimplifiedRoot(chord) {
            const p = parseRoot(chord);
            if (!p) return chord;
            const pc = rootToPitch(p.root);
            if (pc === null) return chord;
            const note = pitchToNote(pc);
            const isMinor = /^m(?!aj)/i.test(p.suffix);
            return note + (isMinor ? 'm' : '');
        }

        function suggestCapo() {
            const box = document.getElementById('capo-suggestion');
            const chords = extractChords(currentRawText);
            if (chords.length === 0) { box.style.display = 'none'; return; }

            let bestCapo = 0;
            let bestScore = -1;
            let bestChords = [];

            for (let capo = 0; capo <= 7; capo++) {
                const transposed = chords.map(ch => {
                    const simple = simplifyChord(transposeChord(ch, -capo));
                    return chordSimplifiedRoot(simple);
                });
                const uniqueT = [...new Set(transposed)];
                const easyCount = uniqueT.filter(c => EASY_CHORDS.has(c)).length;
                const score = easyCount / uniqueT.length;
                if (score > bestScore || (score === bestScore && capo < bestCapo)) {
                    bestScore = score;
                    bestCapo = capo;
                    bestChords = uniqueT;
                }
            }

            if (bestCapo === 0 && bestScore >= 1) {
                box.style.display = 'block';
                document.getElementById('capo-suggest-title').textContent = '✓ Bez kapo — akordy są proste';
                document.getElementById('capo-suggest-details').textContent = bestChords.join(', ');
            } else if (bestCapo > 0) {
                box.style.display = 'block';
                document.getElementById('capo-suggest-title').textContent = '💡 Sugerowany kapo: próg ' + bestCapo;
                document.getElementById('capo-suggest-details').innerHTML =
                    'Akordy z capo ' + bestCapo + ': <span style="color:#ccc;">' + bestChords.join(', ') + '</span>';
            } else {
                box.style.display = 'none';
            }
        }

        // ===== RENDERING =====
        // Use server-generated HTML (same as stage view) and transform chords client-side
        function transformServerHtml(html) {
            if (!html) return '';

            const container = document.createElement('div');
            container.innerHTML = html;

            if (!currentSettings.show_chords) {
                container.querySelectorAll('.chord-wrapper').forEach(el => el.remove());
                return container.innerHTML;
            }
            const chordEls = container.querySelectorAll('.chord');
            chordEls.forEach(el => {
                const rawChord = el.textContent;
                const { display, cls } = processChord(rawChord);

                el.className = cls;
                const isNashville = currentSettings.chord_notation === 'nashville';
                if (currentSettings.diagram_instrument !== 'off' && !isNashville) {
                    el.classList.add('clickable');
                    el.setAttribute('data-chord', rawChord);
                    el.setAttribute('data-chord-display', display);
                    el.setAttribute('onclick', 'showChordPopup(event, this.dataset.chord, this.dataset.chordDisplay)');
                }

                if (display.includes('/') && !isNashville) {
                    const parts = display.split('/');
                    el.innerHTML = parts[0] + "<span class='bass-slash'>/</span><span class='bass-note'>" + parts.slice(1).join('/') + "</span>";
                } else {
                    el.textContent = display;
                }
            });
            return container.innerHTML;
        }

        function rerender() {
            if (currentContent.style.display === 'none') return;
            currentContent.innerHTML = transformServerHtml(currentBandHtml);
            currentContent.style.fontSize = currentSettings.font_size + 'vh';
            setTimeout(() => fitText('current-slide', 'current-content', currentSettings.font_size, 3), 0);

            // Next section (max 4 lines like stage view)
            if (currentBandNext && currentBandNext.trim()) {
                let rawLines = currentBandNext.split('<br>');
                let trimmed = rawLines.length > 4
                    ? rawLines.slice(0, 4).join('<br>') + '<br><span style="opacity:0.6;font-size:0.8em;">(...)</span>'
                    : currentBandNext;
                document.getElementById('next-text-inner').innerHTML = transformServerHtml(trimmed);
                document.getElementById('next-label').style.display = 'block';
                setTimeout(() => fitText('next-content', 'next-text-inner', 4.5, 2.5), 0);
            } else {
                document.getElementById('next-text-inner').innerHTML = '';
                document.getElementById('next-label').style.display = 'none';
            }

            // Meta info
            const keyBox = document.getElementById('key-display');
            const capoBox = document.getElementById('capo-display');
            if (currentKey && currentKey !== 'N/A' && currentKey.trim() !== '-') {
                const displayKey = convertNotation(currentKey);
                keyBox.innerText = 'Tonacja: ' + displayKey;
                keyBox.style.display = 'block';
                if (currentSettings.capo_fret > 0) {
                    const capoKey = convertNotation(transposeChord(currentKey, -currentSettings.capo_fret));
                    capoBox.innerText = 'Capo ' + currentSettings.capo_fret + ' → graj ' + capoKey;
                    capoBox.style.display = 'block';
                } else {
                    capoBox.style.display = 'none';
                }
            } else {
                keyBox.style.display = 'none';
                capoBox.style.display = 'none';
            }

            const bpmBox = document.getElementById('bpm-display');
            if (currentBpm && currentBpm > 0) {
                bpmBox.innerText = currentBpm + ' BPM';
                bpmBox.style.display = 'block';
            } else {
                bpmBox.style.display = 'none';
            }

            suggestCapo();
        }

        // Auto-Scale (same as stage)
        function fitText(containerId, contentId, maxVh, minVh) {
            const container = document.getElementById(containerId);
            const content = document.getElementById(contentId);
            if (!container || !content) return;
            if (container.style.display === 'none' || content.style.display === 'none') return;
            let size = maxVh;
            content.style.fontSize = size + 'vh';
            while (content.scrollHeight > container.clientHeight && size > minVh) {
                size -= 0.2;
                content.style.fontSize = size + 'vh';
            }
        }

        // Clock
        function updateClock() {
            document.getElementById('realtime-clock').innerText =
                new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }
        setInterval(updateClock, 1000);
        updateClock();

        // ===== FULLSCREEN =====
        function toggleFullscreen() {
            var doc = window.document, docEl = doc.documentElement;
            var req = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
            var cancel = doc.exitFullscreen || doc.mozCancelFullScreen || doc.webkitExitFullscreen || doc.msExitFullscreen;
            if (!doc.fullscreenElement && !doc.mozFullScreenElement && !doc.webkitFullscreenElement && !doc.msFullscreenElement) {
                if (req) req.call(docEl).catch(() => {});
            } else {
                if (cancel) cancel.call(doc);
            }
        }

        // ===== SOCKET EVENTS =====
        socket.on('update_slide', function(data) {
            if (data.mode === 'logo') {
                worshipView.style.display = 'flex';
                confView.style.display = 'none';
                currentContent.style.display = 'none';
                stageLogo.style.display = 'block';
                document.getElementById('next-text-inner').innerHTML = '';
                document.getElementById('next-label').style.display = 'none';
                currentRawText = '';
                currentRawNext = '';
                currentBandHtml = '';
                currentBandNext = '';
            }
            else if (data.mode === 'blackout') {
                worshipView.style.display = 'flex';
                confView.style.display = 'none';
                document.getElementById('next-text-inner').innerHTML = '';
                document.getElementById('next-label').style.display = 'none';
                currentRawNext = '';
                currentBandNext = '';
            }
            else if (data.mode === 'conference') {
                worshipView.style.display = 'none';
                confView.style.display = 'flex';
                document.getElementById('conf-timer').innerText = data.timer;
                document.getElementById('conf-timer').style.color = data.timer_color;
                document.getElementById('conf-message').innerText = data.message;
            }
            else {
                worshipView.style.display = 'flex';
                confView.style.display = 'none';
                stageLogo.style.display = 'none';
                currentContent.style.display = 'block';

                if (data.raw_text !== undefined) currentRawText = data.raw_text;
                if (data.raw_next !== undefined) currentRawNext = data.raw_next;
                if (data.band !== undefined) currentBandHtml = data.band;
                if (data.band_next !== undefined) currentBandNext = data.band_next;

                if (data.current_key && data.current_key !== 'N/A') {
                    currentKey = data.current_key;
                }
                if (data.current_bpm && data.current_bpm > 0) {
                    currentBpm = data.current_bpm;
                }

                rerender();
            }
        });

        socket.on('sync_state_to_client', function(state) {
            if (state.is_blackout) {
                document.getElementById('next-text-inner').innerHTML = '';
                document.getElementById('next-label').style.display = 'none';
            }
        });

        socket.on('refresh_logo', function() { location.reload(); });

        // ===== SETTINGS UI =====
        function toggleSettings() {
            const panel = document.getElementById('settings-panel');
            const overlay = document.getElementById('settings-overlay');
            const open = panel.classList.toggle('open');
            overlay.style.display = open ? 'block' : 'none';
        }

        function toggleOpt(key) {
            currentSettings[key] = !currentSettings[key];
            updateToggles();
            rerender();
        }

        function setDiagramInstrument(val) {
            currentSettings.diagram_instrument = val;
            rerender();
        }

        function setNotation(val) {
            currentSettings.chord_notation = val;
            document.getElementById('chord-notation').value = val;
            rerender();
        }

        function updateToggles() {
            document.getElementById('tog-chords').classList.toggle('active', currentSettings.show_chords);
            document.getElementById('tog-lowercase-minor').classList.toggle('active', currentSettings.lowercase_minor);
            document.getElementById('tog-beginner').classList.toggle('active', currentSettings.beginner_mode);
            document.getElementById('chord-notation').value = currentSettings.chord_notation || 'international';
            document.getElementById('diagram-instrument').value = currentSettings.diagram_instrument || 'guitar';
        }

        // ===== CHORD POPUP =====
        function showChordPopup(event, chordName, displayName) {
            event.stopPropagation();
            const popup = document.getElementById('chord-popup');
            const content = document.getElementById('chord-popup-content');
            const label = displayName || chordName;

            const inst = currentSettings.diagram_instrument;
            let html = '';

            if (inst === 'guitar') {
                const guitarName = chordName.includes('/') ? chordName.split('/')[0] : chordName;
                const data = lookupChord(guitarName);
                html = data ? renderChordSVG(label, data) : `<div class="no-diagram"><strong>${label}</strong><br>Brak diagramu</div>`;
            } else {
                const notes = lookupPianoChord(chordName);
                html = notes ? renderPianoSVG(label, notes) : `<div class="no-diagram"><strong>${label}</strong><br>Brak diagramu</div>`;
            }

            content.innerHTML = html;
            popup.style.display = 'block';

            const rect = event.target.getBoundingClientRect();
            const popupW = inst === 'piano' ? 220 : 140;
            let x = rect.left + rect.width / 2 - popupW / 2;
            let y = rect.bottom + 8;

            if (x < 8) x = 8;
            if (x + popupW > window.innerWidth) x = window.innerWidth - popupW - 8;
            if (y + 180 > window.innerHeight) y = rect.top - 180;

            popup.style.left = x + 'px';
            popup.style.top = y + 'px';
        }

        function hideChordPopup() {
            document.getElementById('chord-popup').style.display = 'none';
        }

        document.addEventListener('click', function(e) {
            const popup = document.getElementById('chord-popup');
            if (popup.style.display === 'block' && !popup.contains(e.target) && !e.target.classList.contains('clickable')) {
                hideChordPopup();
            }
        });

        function setCapo(val) { currentSettings.capo_fret = val; rerender(); }

        function setFontSize(val) {
            currentSettings.font_size = val;
            document.getElementById('font-size-val').textContent = val;
            rerender();
        }

        // ===== PRESETS =====
        function loadPreset(id) {
            if (!id) { activePresetId = null; return; }
            const opt = document.querySelector(`#preset-select option[value="${id}"]`);
            if (!opt) return;
            const cfg = JSON.parse(opt.dataset.cfg);
            if ('show_diagrams' in cfg && !('diagram_instrument' in cfg)) {
                cfg.diagram_instrument = cfg.show_diagrams ? 'guitar' : 'off';
                delete cfg.show_diagrams;
            }
            if ('nashville_mode' in cfg && !('chord_notation' in cfg)) {
                cfg.chord_notation = cfg.nashville_mode ? 'nashville' : 'international';
            }
            delete cfg.nashville_mode;
            currentSettings = { ...currentSettings, ...cfg };
            activePresetId = +id;
            document.getElementById('capo-select').value = currentSettings.capo_fret;
            document.getElementById('font-size-range').value = currentSettings.font_size;
            document.getElementById('font-size-val').textContent = currentSettings.font_size;
            updateToggles();
            rerender();
        }

        function savePresetDialog() {
            const name = prompt('Nazwa presetu:', activePresetId ? document.querySelector(`#preset-select option[value="${activePresetId}"]`)?.textContent : '');
            if (!name) return;
            const payload = { ...currentSettings, name };
            if (activePresetId) payload.id = activePresetId;
            fetch('/api/presets', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(r => r.json()).then(data => { activePresetId = data.id; refreshPresetList(); });
        }

        function deleteCurrentPreset() {
            if (!activePresetId) return;
            if (!confirm('Usunąć ten preset?')) return;
            fetch('/api/presets/' + activePresetId, { method: 'DELETE' })
            .then(() => { activePresetId = null; refreshPresetList(); });
        }

        function refreshPresetList() {
            fetch('/api/presets').then(r => r.json()).then(presets => {
                const sel = document.getElementById('preset-select');
                sel.innerHTML = '<option value="">— Wybierz preset —</option>';
                for (const p of presets) {
                    const opt = document.createElement('option');
                    opt.value = p.id; opt.textContent = p.name;
                    opt.dataset.cfg = JSON.stringify({ show_chords: p.show_chords, chord_notation: p.chord_notation || 'international', lowercase_minor: p.lowercase_minor || false, capo_fret: p.capo_fret, beginner_mode: p.beginner_mode, diagram_instrument: p.diagram_instrument || 'guitar', font_size: p.font_size });
                    sel.appendChild(opt);
                }
                if (activePresetId) sel.value = activePresetId;
            });
        }

        updateToggles();
    </script>
</body>
</html>
