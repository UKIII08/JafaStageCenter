<!DOCTYPE html>
<html>
<head>
    <title>JafaStage - Presenter View</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        iframe { width: 100vw; height: 100vh; border: none; }
        #badge { position: fixed; top: 10px; left: 10px; background: #3d84ff; color: white; padding: 5px 15px; border-radius: 5px; z-index: 100; font-size: 12px; }
    </style>
</head>
<body>
    <div id="badge">ŁADOWANIE SLAJDU N+1...</div>
    <iframe id="canva-frame" src=""></iframe>

    <script src="/static/socket.io.js"></script>
    <script>
        const socket = io();
        const urlParams = new URLSearchParams(window.location.search);
        const iframe = document.getElementById('canva-frame');
        iframe.src = urlParams.get('url');

        // Funkcja wymuszająca przeskok
        function doJump() {
            document.getElementById('badge').innerText = "NASTĘPNY SLAJD (N+1)";
            // Prosimy serwer o kliknięcie strzałką
            fetch('/sync_canva', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ key: 'ArrowRight' })
            });
        }

        // Czekamy 6 sekund od załadowania strony i "strzelamy" N+1
        window.onload = () => {
            setTimeout(doJump, 6000);
        };
    </script>
</body>
</html>
